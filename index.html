    --bg: #14180F; --surface: #1B2118; --surface-alt: #232A1F; --surface2: #232A1F;

  }
  .cfo-root::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(600px 400px at 85% -10%, rgba(180,131,42,0.10), transparent 60%),
                radial-gradient(700px 500px at -10% 20%, rgba(22,56,43,0.14), transparent 55%);
  }
  .cfo-root[data-theme="dark"]::before {
    background: radial-gradient(600px 400px at 85% -10%, rgba(217,178,94,0.09), transparent 60%),

  }
  .cfo-root::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: .5;
    background-image: radial-gradient(rgba(0,0,0,.05) 1px, transparent 1px); background-size: 3px 3px;
  }
  .cfo-root[data-theme="dark"]::after {
    opacity: .3; background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
  }

  .cfo-bottomnav { display: flex; }
  .cfo-topbar { display: flex; }
  .cfo-main { flex: 1 1 0; min-width: 0; padding: 20px 16px 96px; }
  .cfo-grid2 { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .cfo-kpigrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  .cfo-goalgrid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .cfo-panelgrid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .cfo-histrow { display: grid; grid-template-columns: 1fr; gap: 10px; }

    .cfo-sidebar { display: flex; }
    .cfo-bottomnav { display: none; }
    .cfo-topbar { display: none; }
    .cfo-main { padding: 32px 40px 48px; }
    .cfo-grid2 { grid-template-columns: 1.65fr 1fr; gap: 24px; }
    .cfo-kpigrid { grid-template-columns: repeat(4,1fr); gap: 14px; }
    .cfo-goalgrid { grid-template-columns: repeat(3,1fr); gap: 18px; }
    .cfo-panelgrid { grid-template-columns: repeat(2,1fr); gap: 18px; }
    .cfo-histrow { grid-template-columns: 70px 1fr 1fr 1fr 1fr; align-items: center; gap: 14px; }
  }

  .cfo-btn { font-family: "IBM Plex Sans", sans-serif; font-weight: 600; cursor: pointer; border: none; }

  .cfo-mono { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }
  .cfo-serif { font-family: Fraunces, Georgia, serif; }
  .cfo-scroll::-webkit-scrollbar { height: 0; width: 6px; }
  .cfo-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  input, select, textarea { font-family: "IBM Plex Sans", sans-serif; outline: none; }
  input:focus, select:focus, textarea:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .cfo-navbtn { background: none; }

  .cfo-overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.45);
    display: flex; align-items: flex-end; justify-content: center;
  }
  @container cfo (min-width: 880px) {
    .cfo-overlay { align-items: center; }
  }

    background: var(--surface); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0;

  @container cfo (min-width: 880px) {
    .cfo-sheet { border-radius: 16px; padding: 26px; }
  }
  .cfo-seg { display: flex; gap: 6px; background: var(--surface-alt); padding: 4px; border-radius: 10px; margin-bottom: 14px; }

  if (dISO === tISO) return "Hoy · " + suffix;
  if (dISO === yISO) return "Ayer · " + suffix;
  return suffix.charAt(0).toUpperCase() + suffix.slice(1);
}

function loadLocalState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedData();
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.transactions) return seedData();
    return Object.assign(seedData(), parsed);
  } catch (e) { return seedData(); }
}

function saveLocalState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

// ---------- Firebase (Firestore) sync ----------
// Un solo documento con todo el estado — simple y suficiente para un solo usuario.
let _fbApp = null;
function getDb() {
  if (typeof firebase === "undefined") return null;
  if (_fbApp) return firebase.firestore(_fbApp);
  try {
    try { _fbApp = firebase.app(); }
    catch (e) { _fbApp = firebase.initializeApp(FIREBASE_CONFIG); }
    return firebase.firestore(_fbApp);
  } catch (e) { console.error("Firebase init:", e.message); return null; }
}

function useFirebaseSync(state, setState) {
  const [syncStatus, setSyncStatus] = useState({ connected: false, syncing: false, lastSyncedAt: null, error: null });
  const lastWriteTs = useRef(0);
  const writeTimer = useRef(null);
  const firstSnapshot = useRef(true);

  // Suscripción en tiempo real: al montar, y cada vez que cambie el doc remoto.
  useEffect(() => {
    const db = getDb();
    if (!db) { setSyncStatus(s => ({ ...s, connected: false, error: "Sin conexión a Firestore" })); return; }
    const ref = db.collection(FIRESTORE_COLLECTION).doc(FIRESTORE_DOC_ID);
    const unsub = ref.onSnapshot(
      (doc) => {
        setSyncStatus(s => ({ ...s, connected: true, error: null }));
        if (!doc.exists) { firstSnapshot.current = false; return; }
        const data = doc.data();
        if (!data || !data.value) { firstSnapshot.current = false; return; }
        // Ignora el eco de nuestra propia escritura reciente.
        if (data.ts && data.ts <= lastWriteTs.current) { firstSnapshot.current = false; return; }
        try {
          const remote = JSON.parse(data.value);
          setState(remote);
          setSyncStatus(s => ({ ...s, lastSyncedAt: Date.now() }));
        } catch (e) {}
        firstSnapshot.current = false;
      },
      (err) => {
        setSyncStatus(s => ({ ...s, connected: false, error: err.message }));
      }
    );
    return () => unsub();
    // eslint-disable-next-line
  }, []);

  // Escritura con debounce cada vez que cambia el estado local.
  useEffect(() => {
    const db = getDb();
    if (!db) return;
    if (writeTimer.current) clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(() => {
      const ts = Date.now();
      lastWriteTs.current = ts;
      setSyncStatus(s => ({ ...s, syncing: true }));
      db.collection(FIRESTORE_COLLECTION).doc(FIRESTORE_DOC_ID)
        .set({ value: JSON.stringify(state), ts })
        .then(() => setSyncStatus(s => ({ ...s, syncing: false, connected: true, lastSyncedAt: Date.now(), error: null })))
        .catch((err) => setSyncStatus(s => ({ ...s, syncing: false, error: err.message })));
    }, 400);
    return () => clearTimeout(writeTimer.current);
  }, [state]);

  return syncStatus;
}

function fmtRelativeTime(ts) {
  if (!ts) return "nunca";
  const diffMs = Date.now() - ts;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "justo ahora";
  if (mins === 1) return "hace 1 min";
  if (mins < 60) return "hace " + mins + " min";
  const hrs = Math.floor(mins / 60);
  if (hrs === 1) return "hace 1 hora";
  return "hace " + hrs + " horas";
}

// ---------- shared bits ----------

function KPICard({ label, value, note, mono }) {
  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: 16 }}>
      <div style={{ fontSize: 11.5, color: "var(--muted)", marginBottom: 8 }}>{label}</div>
      <div className={"cfo-serif" + (mono !== false ? " cfo-mono" : "")} style={{ fontSize: 22, fontWeight: 500, color: "var(--text)" }}>{value}</div>
      {note && <div style={{ fontSize: 11, color: "var(--success)", marginTop: 4 }}>{note}</div>}
    </div>
  );
}

function Toast({ message }) {
  if (!message) return null;
  return <div className="cfo-toast">{message}</div>;
}

// ---------- Hoy ----------

function HoyScreen({ state, actions }) {
  const liquidezPct = Math.min(100, Math.round((state.quincena.day / state.quincena.total) * 100));
  const totalIngresoMes = useMemo(() => state.transactions.filter(t => t.type === "ingreso").reduce((a,b)=>a+b.amount,0), [state.transactions]);
  const totalAhorroMes = useMemo(() => state.transactions.filter(t => t.type === "ahorro").reduce((a,b)=>a+b.amount,0), [state.transactions]);
  const tasaAhorro = totalIngresoMes > 0 ? Math.round(((totalAhorroMes) / totalIngresoMes) * 100) : state.finance.tasaAhorroMeta;
  const patrimonioNeto = state.finance.baseAssets + state.ahorroAcumulado - state.finance.deudaTotal;

  const restaurantSpend = useMemo(() => state.transactions.filter(t => t.type === "gasto" && t.category === "Restaurantes").reduce((a,b)=>a+b.amount,0), [state.transactions]);

  return (
    <div data-screen-label="Hoy">
      <div className="cfo-grid2">
        <div style={{ display: "flex", flexDirection: "column", gap: 16, minWidth: 0 }}>

          <div style={{ background: "var(--primary)", color: "var(--on-primary)", borderRadius: 16, padding: "28px 26px", position: "relative", overflow: "hidden" }}>
            <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", opacity: .7, marginBottom: 10 }}>Liquidez actual</div>
            <div className="cfo-serif cfo-mono" style={{ fontSize: 56, fontWeight: 500, lineHeight: 1, letterSpacing: "-0.01em" }}>{fmtMoney(state.liquidez)}</div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 22, marginBottom: 8 }}>
              <span style={{ fontSize: 12, opacity: .75 }}>Quincena en curso</span>
              <span className="cfo-mono" style={{ fontSize: 12, opacity: .9 }}>Día {state.quincena.day} de {state.quincena.total}</span>
            </div>
            <div style={{ height: 8, borderRadius: 99, background: "rgba(255,255,255,0.16)", overflow: "hidden" }}>
              <div style={{ height: "100%", width: liquidezPct + "%", borderRadius: 99, background: "var(--accent)", boxShadow: "rgba(180,131,42,0.55) 0 0 14px" }}></div>
            </div>
          </div>

          <div className="cfo-kpigrid">
            <KPICard label="Patrimonio neto" value={fmtMoney(patrimonioNeto)} note={(state.finance.patrimonioDelta >= 0 ? "+" : "") + state.finance.patrimonioDelta + "% vs. mes anterior"} />
            <KPICard label="Deuda total" value={fmtMoney(state.finance.deudaTotal)} note="Se actualiza al pagar" />
            <KPICard label="Ahorro acumulado" value={fmtMoney(state.ahorroAcumulado)} note={"+" + fmtMoney(state.ahorroAcumulado - state.ahorroMesAnterior) + " este mes"} />
            <KPICard label="Tasa de ahorro" value={tasaAhorro + "%"} note={"meta: " + state.finance.tasaAhorroMeta + "%"} />
          </div>

          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: "18px 20px" }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 12 }}>Acciones pendientes</div>
            {state.pending.map(p => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: "1px solid var(--border-soft)" }}>
                <input type="checkbox" checked={p.done} onChange={() => actions.togglePending(p.id)} style={{ width: 17, height: 17, accentColor: "var(--primary)" }} />
                <div style={{ flex: 1, fontSize: 13, color: p.done ? "var(--muted-light)" : "var(--text)", textDecoration: p.done ? "line-through" : "none" }}>{p.text}</div>
                {p.amount != null && <div className="cfo-mono" style={{ fontSize: 13, color: "var(--danger)" }}>{fmtMoney(p.amount)}</div>}

            ))}

function AddTransactionSheet({ categories, onClose, onSave }) {
  const [type, setType] = useState("gasto");
  const [desc, setDesc] = useState("");
  const [category, setCategory] = useState(categories[0] || "");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());

  function submit(e) {

  return (
    <div className="cfo-overlay" onClick={onClose}>
      <div className="cfo-sheet" onClick={e => e.stopPropagation()}>

            {["gasto","ingreso","ahorro"].map(t => (
              <button type="button" key={t} className={type === t ? "active" : ""} onClick={() => setType(t)}>

          <input className="cfo-field" type="date" value={date} onChange={e => setDate(e.target.value)} />

function MovimientosScreen({ state, actions }) {
  const [query, setQuery] = useState("");
  const [activeCat, setActiveCat] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const filtered = useMemo(() => {
    return state.transactions.filter(t => {
      if (activeCat && t.category !== activeCat) return false;
      if (query && !t.desc.toLowerCase().includes(query.toLowerCase())) return false;
      return true;
    });
  }, [state.transactions, query, activeCat]);

  const groups = useMemo(() => {
    const byDate = {};
    filtered.slice().sort((a,b) => b.date.localeCompare(a.date) || 0).forEach(t => {
      if (!byDate[t.date]) byDate[t.date] = [];
      byDate[t.date].push(t);
    });
    return Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(d => ({ date: d, items: byDate[d] }));
  }, [filtered]);

  return (
    <div data-screen-label="Movimientos" style={{ position: "relative" }}>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", marginBottom: 14 }}>
        <input placeholder="Buscar movimiento..." value={query} onChange={e => setQuery(e.target.value)}
          style={{ flex: 1, minWidth: 160, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 9, padding: "10px 14px", fontSize: 13, color: "var(--text)" }} />
        <button className="cfo-btn" onClick={() => setShowAdd(true)} style={{ background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, padding: "10px 18px", fontSize: 13, whiteSpace: "nowrap" }}>+ Agregar transacción</button>
      </div>
      <div className="cfo-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 18, paddingBottom: 2 }}>
        {state.categories.map(c => (
          <div key={c} onClick={() => setActiveCat(activeCat === c ? null : c)}
            style={{ cursor: "pointer", fontSize: 12, padding: "6px 14px", borderRadius: 99, background: activeCat === c ? "var(--primary)" : "var(--surface-alt)", color: activeCat === c ? "var(--on-primary)" : "var(--text)", border: "1px solid var(--border)", whiteSpace: "nowrap" }}>
            {c}
          </div>
        ))}
      </div>

      {groups.length === 0 && <div style={{ fontSize: 13, color: "var(--muted)", textAlign: "center", padding: "40px 0" }}>Sin movimientos que coincidan.</div>}

      {groups.map(g => {
        const subtotal = g.items.reduce((a,b) => a + (b.type === "gasto" ? -b.amount : b.amount), 0);
        return (
          <div key={g.date} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--muted)" }}>{fmtDateLabel(g.date)}</div>
              <div className="cfo-mono" style={{ fontSize: 12.5, color: "var(--muted)" }}>Subtotal {fmtMoney(subtotal)}</div>
            </div>
            <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
              {g.items.map((t, i) => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: i < g.items.length - 1 ? "1px solid var(--border-soft)" : "none" }}>
                  <div style={{ width: 34, height: 34, borderRadius: 9, background: "var(--surface-alt)", flex: "0 0 auto" }}></div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>{t.desc}</div>
                    <div style={{ fontSize: 11.5, color: "var(--muted)" }}>{t.category}</div>
                  </div>
                  <div className="cfo-mono" style={{ fontSize: 13.5, color: t.type === "gasto" ? "var(--danger)" : "var(--success)", whiteSpace: "nowrap" }}>
                    {t.type === "gasto" ? "-" : "+"}{fmtMoney(t.amount)}
                  </div>
                  <button className="cfo-btn" onClick={() => actions.deleteTransaction(t.id)} title="Eliminar"
                    style={{ background: "none", color: "var(--muted-light)", fontSize: 16, padding: "0 4px", lineHeight: 1 }}>×</button>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {showAdd && <AddTransactionSheet categories={state.categories} onClose={() => setShowAdd(false)}
        onSave={(tx) => { actions.addTransaction(tx); setShowAdd(false); }} />}
    </div>
  );
}

function PresupuestoScreen({ state, actions }) {
  const [sub, setSub] = useState("actual"); // 'actual' | 'planeador'
  const [showAdd, setShowAdd] = useState(false);

  const realByCategory = useMemo(() => {
    const map = {};
    state.transactions.filter(t => t.type === "gasto").forEach(t => {
      map[t.category] = (map[t.category] || 0) + t.amount;
    });
    return map;
  }, [state.transactions]);

  const rows = state.budgets.map(b => ({
    ...b,
    real: realByCategory[b.category] || 0,
    pct: b.amount > 0 ? (realByCategory[b.category] || 0) / b.amount * 100 : 0
  }));
  const totalBudget = rows.reduce((s,r) => s + r.amount, 0);
  const totalReal = rows.reduce((s,r) => s + r.real, 0);

  // Planeador
  const ingresoEsperado = state.finance.ingresoEsperadoQuincenal || 0;
  const fijosYDeuda = state.finance.fijosYDeuda || 0;
  const disponibleARepartir = Math.max(0, ingresoEsperado - fijosYDeuda);
  const planner = state.planner;
  const totalPct = planner.pctMetas + planner.pctAhorro + planner.pctDeseos;
  const montoMetas = Math.round(disponibleARepartir * planner.pctMetas / 100);
  const montoAhorro = Math.round(disponibleARepartir * planner.pctAhorro / 100);
  const montoDeseos = Math.round(disponibleARepartir * planner.pctDeseos / 100);

  const today = new Date();
  const payDays = [10, 25];
  const dom = today.getDate();
  let nextLabelDate;
  if (dom < payDays[0]) { nextLabelDate = new Date(today.getFullYear(), today.getMonth(), payDays[0]); }
  else if (dom < payDays[1]) { nextLabelDate = new Date(today.getFullYear(), today.getMonth(), payDays[1]); }
  else { nextLabelDate = new Date(today.getFullYear(), today.getMonth()+1, payDays[0]); }
  const nextLabel = "Próxima quincena · " + nextLabelDate.toLocaleDateString("es-MX", { day: "numeric", month: "long" });

  return (
    <div data-screen-label="Presupuesto">
      <div className="cfo-seg" style={{ width: "fit-content", marginBottom: 20 }}>
        <button className={sub === "actual" ? "active" : ""} onClick={() => setSub("actual")} style={{ padding: "9px 18px" }}>Presupuesto actual</button>
        <button className={sub === "planeador" ? "active" : ""} onClick={() => setSub("planeador")} style={{ padding: "9px 18px" }}>Planeador</button>
      </div>

      {sub === "actual" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--muted)" }}>Presupuesto por categoría</div>
            <button className="cfo-btn" onClick={() => setShowAdd(true)} style={{ background: "none", color: "var(--accent)", fontSize: 12.5 }}>+ Nueva categoría</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {rows.map(r => {
              const over = r.pct > 100;
              const barColor = over ? "var(--danger)" : r.pct >= 80 ? "var(--warn)" : "var(--success)";
              const statusText = over
                ? Math.round(r.pct - 100) + "% sobre el presupuesto"
                : Math.round(100 - r.pct) + "% disponible";
              return (
                <div key={r.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8, gap: 10, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 13.5, fontWeight: 600 }}>{r.category}</div>
                    <div className="cfo-mono" style={{ fontSize: 12.5, color: "var(--muted)" }}>{fmtMoney(r.real)} / {fmtMoney(r.amount)}</div>
                  </div>
                  <div style={{ height: 6, borderRadius: 99, background: "var(--surface-alt)", overflow: "hidden", marginBottom: 8 }}>
                    <div style={{ height: "100%", width: Math.min(100, r.pct) + "%", borderRadius: 99, background: barColor }}></div>
                  </div>
                  <div style={{ fontSize: 12, color: over ? "var(--danger)" : "var(--muted)" }}>{statusText}</div>
                </div>
              );
            })}
            {rows.length === 0 && <div style={{ fontSize: 13, color: "var(--muted)", textAlign: "center", padding: "30px 0" }}>Sin categorías presupuestadas todavía.</div>}
            <div style={{ display: "flex", justifyContent: "space-between", padding: "14px 16px", background: "var(--surface-alt)", borderRadius: 12, fontWeight: 600 }}>
              <div className="cfo-serif">Total</div>
              <div className="cfo-mono">{fmtMoney(totalReal)} / {fmtMoney(totalBudget)}</div>
            </div>
          </div>
        </div>
      )}

      {sub === "planeador" && (
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 22 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: 700, marginBottom: 6 }}>Planeador</div>
          <div className="cfo-serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 18 }}>{nextLabel}</div>

          <div className="cfo-kpigrid" style={{ gridTemplateColumns: "1fr 1fr", marginBottom: 20 }}>
            <KPICard label="Ingreso esperado" value={fmtMoney(ingresoEsperado)} />
            <KPICard label="Fijos + deuda" value={fmtMoney(fijosYDeuda)} />
          </div>

          <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 18 }}>
            Disponible a repartir: <span className="cfo-mono" style={{ fontWeight: 600, color: "var(--text)" }}>{fmtMoney(disponibleARepartir)}</span>
          </div>

          {[
            { key: "pctMetas", label: "Metas", monto: montoMetas },
            { key: "pctAhorro", label: "Ahorro", monto: montoAhorro },
            { key: "pctDeseos", label: "Deseos", monto: montoDeseos }
          ].map(s => (
            <div key={s.key} style={{ marginBottom: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span>{s.label}</span>
                <span className="cfo-mono">{planner[s.key]}% · {fmtMoney(s.monto)}</span>
              </div>
              <input type="range" min="0" max="100" value={planner[s.key]}
                onChange={e => actions.setPlannerPct(s.key, parseInt(e.target.value, 10))}
                style={{ width: "100%", accentColor: "var(--primary)" }} />
            </div>
          ))}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", marginBottom: 18, borderTop: "1px solid var(--border-soft)", paddingTop: 14 }}>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>Total repartido</span>
            <span className="cfo-mono" style={{ fontWeight: 600, color: totalPct === 100 ? "var(--success)" : "var(--danger)" }}>{totalPct}%</span>
          </div>

          <button className="cfo-btn" onClick={() => actions.applyPlanToBudget(montoMetas, montoAhorro, montoDeseos)}
            style={{ width: "100%", background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, padding: 13, fontSize: 13.5, fontWeight: 600 }}>
            ⚡ Aplicar al presupuesto
          </button>
        </div>
      )}

      {showAdd && <AddBudgetSheet categories={state.categories} onClose={() => setShowAdd(false)}
        onSave={(payload) => { actions.addBudget(payload); setShowAdd(false); }} />}
    </div>
  );
}

// ---------- Gasolina ----------

function FuelGauge({ pct }) {
  const ticks = [];
  for (let i = 0; i < 12; i++) {
    const deg = i * 30;
    const active = (i / 12) * 100 <= pct;
    ticks.push(
      <div key={i} style={{ position: "absolute", top: "50%", left: "50%", width: 3, height: 16, borderRadius: 2,
        background: active ? "var(--accent)" : "var(--border)",
        transform: "translate(-50%, -92px) rotate(" + deg + "deg)", transformOrigin: "50% 92px" }}></div>
    );
  }
  return (
    <div style={{ position: "relative", width: 200, height: 200 }}>
      {ticks}
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div className="cfo-serif" style={{ fontSize: 34, fontWeight: 500, color: "var(--accent)" }}>{pct}%</div>
        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>del tanque</div>
      </div>
    </div>
  );
}

function GasolinaScreen({ state, actions }) {
  const [liters, setLiters] = useState("");
  const [cost, setCost] = useState("");
  const [odometer, setOdometer] = useState("");

  const logs = state.fuelLogs;
  const kmlPromedio = logs.length ? (logs.reduce((a,b) => a + (b.kml || 0), 0) / logs.length).toFixed(1) : "0.0";
  const kmlGlobal = logs.length > 1 ? (logs.reduce((a,b) => a + (b.kml || 0), 0) / logs.length * 0.96).toFixed(1) : kmlPromedio;
  const costoPorKm = logs.length ? (logs[0].cost / (logs[0].liters * (logs[0].kml || 1))).toFixed(2) : "0.00";
  const autonomia = logs.length ? Math.round((state.tankPct/100) * 60 * parseFloat(kmlPromedio)) : 0;

  function submit(e) {
    e.preventDefault();
    const l = parseFloat(liters), c = parseFloat(cost), o = parseFloat(odometer);
    if (!l || !c || !o) return;
    actions.addFuel({ liters: l, cost: c, odometer: o });
    setLiters(""); setCost(""); setOdometer("");
  }

  return (
    <div data-screen-label="Gasolina">
      <div className="cfo-grid2" style={{ marginBottom: 24 }}>
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 26, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <FuelGauge pct={state.tankPct} />
        </div>
        <div className="cfo-kpigrid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <KPICard label="km/L promedio" value={kmlPromedio} />
          <KPICard label="km/L global" value={kmlGlobal} />
          <KPICard label="Costo por km" value={"$" + costoPorKm} />
          <KPICard label="Autonomía est." value={autonomia + " km"} />
        </div>
      </div>

      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20, marginBottom: 24 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Registrar carga</div>
        <form onSubmit={submit} style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10 }}>
          <input value={liters} onChange={e => setLiters(e.target.value)} type="number" step="0.1" min="0" placeholder="Litros"
            style={{ background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", fontSize: 13, color: "var(--text)" }} />
          <input value={cost} onChange={e => setCost(e.target.value)} type="number" step="0.01" min="0" placeholder="Costo total"
            style={{ background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", fontSize: 13, color: "var(--text)" }} />
          <input value={odometer} onChange={e => setOdometer(e.target.value)} type="number" step="1" min="0" placeholder="Odómetro"
            style={{ background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", fontSize: 13, color: "var(--text)" }} />
          <button type="submit" className="cfo-btn" style={{ background: "var(--primary)", color: "var(--on-primary)", borderRadius: 8, padding: 10, fontSize: 13 }}>Guardar</button>
        </form>
      </div>

      <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 12 }}>Historial</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {logs.map(f => {
          const deg = Math.min(360, Math.round((f.kml / 20) * 360));
          const color = f.kml >= 12 ? "var(--success)" : f.kml >= 10 ? "var(--warn)" : "var(--danger)";
          return (
            <div key={f.id} className="cfo-histrow" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "12px 16px" }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: "conic-gradient(var(--accent) " + deg + "deg, var(--surface-alt) 0)" }}></div>
              <div style={{ fontSize: 12.5, color: "var(--muted)" }}>{fmtShortDate(f.date)}</div>
              <div className="cfo-mono" style={{ fontSize: 12.5 }}>{f.liters} L</div>
              <div className="cfo-mono" style={{ fontSize: 12.5 }}>{fmtMoney(f.cost)}</div>
              <div className="cfo-mono" style={{ fontSize: 13, fontWeight: 600, color }}>{f.kml} km/L</div>
            </div>
          );
        })}
        {logs.length === 0 && <div style={{ fontSize: 13, color: "var(--muted)" }}>Aún no hay cargas registradas.</div>}
      </div>
    </div>
  );
}

// ---------- Datos & Configuración ----------

function DatosScreen({ state, actions, toast, syncStatus }) {
  const [newCat, setNewCat] = useState("");
  const fileInputRef = useRef(null);

  function addCategory() {
    const v = newCat.trim();
    if (!v || state.categories.includes(v)) return;
    actions.addCategory(v);
    setNewCat("");
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cfo-personal-backup-" + todayISO() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Respaldo exportado");
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== "object") throw new Error("bad file");
        actions.replaceState(parsed);
        toast("Respaldo importado");
      } catch (err) {
        toast("Archivo inválido");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function wipeAll() {
    if (!confirm("¿Borrar permanentemente todos tus datos de este dispositivo y de la nube? Esta acción no se puede deshacer.")) return;
    actions.wipeAll();
    toast("Datos eliminados");
  }

  return (
    <div data-screen-label="Datos y Configuracion">
      <div className="cfo-panelgrid">
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Apariencia</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>Tema {state.theme === "dark" ? "oscuro" : "claro"}</span>
            <button className="cfo-btn" onClick={actions.toggleTheme}
              style={{ width: 46, height: 26, borderRadius: 99, background: "var(--primary)", position: "relative", padding: 0 }}>
              <span style={{ position: "absolute", top: 3, left: state.theme === "dark" ? 23 : 3, width: 20, height: 20, borderRadius: "50%", background: "var(--on-primary)", transition: "left .15s" }}></span>
            </button>
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Categorías</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {state.categories.map(c => (
              <div key={c} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 99, background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", whiteSpace: "nowrap" }}>
                {c} <span onClick={() => actions.removeCategory(c)} style={{ cursor: "pointer", opacity: .5, marginLeft: 4 }}>×</span>
              </div>
            ))}
            <input value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => e.key === "Enter" && addCategory()}
              placeholder="+ Nueva" style={{ border: "1px dashed var(--border)", borderRadius: 99, padding: "5px 14px", fontSize: 12, color: "var(--muted)", background: "none", width: 90 }} />
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Sincronización</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 9, height: 9, borderRadius: "50%", background: syncStatus.connected ? "var(--success)" : "var(--danger)" }}></div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>
              {syncStatus.connected
                ? "Conectado a Firestore · " + fmtRelativeTime(syncStatus.lastSyncedAt)
                : (syncStatus.error || "Sin conexión a Firestore")}
            </div>
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Respaldo</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="cfo-btn" onClick={exportData} style={{ flex: 1, background: "var(--surface-alt)", color: "var(--text)", borderRadius: 8, padding: 10, fontSize: 12.5 }}>Exportar</button>
            <button className="cfo-btn" onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ flex: 1, background: "var(--surface-alt)", color: "var(--text)", borderRadius: 8, padding: 10, fontSize: 12.5 }}>Importar</button>
            <input ref={fileInputRef} type="file" accept="application/json" onChange={importData} style={{ display: "none" }} />
          </div>
        </div>
      </div>

      <div style={{ border: "1px solid var(--danger)", background: "var(--danger-soft)", borderRadius: 14, padding: 20, marginTop: 18 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--danger)", marginBottom: 8 }}>Zona de peligro</div>
        <div style={{ fontSize: 12.5, color: "var(--muted)", marginBottom: 14 }}>Borra permanentemente todos tus datos financieros de este dispositivo y de Firestore. No hay forma de recuperarlos.</div>
        <button className="cfo-btn" onClick={wipeAll} style={{ background: "var(--danger)", color: "#fff", borderRadius: 8, padding: "10px 16px", fontSize: 12.5 }}>Eliminar todos los datos</button>
      </div>
    </div>
  );
}

// ---------- Shell / Nav ----------

const TABS = [
  { key: "hoy", label: "Hoy", short: "Hoy", group: "Diario" },
  { key: "movimientos", label: "Movimientos", short: "Mov.", group: "Diario" },
  { key: "metas", label: "Metas & Wishlist", short: "Metas", group: "Planeación" },
  { key: "presupuesto", label: "Presupuesto", short: "Presup.", group: "Planeación" },
  { key: "gasolina", label: "Gasolina", short: "Gas", group: "Planeación" },
  { key: "datos", label: "Datos & Configuración", short: "Datos", group: "Sistema" }
];

function App() {
  const [state, setState] = useState(loadLocalState);
  const [tab, setTab] = useState("hoy");
  const [toastMsg, setToastMsg] = useState("");
  const toastTimer = useRef(null);

  useEffect(() => { saveLocalState(state); }, [state]);
  const syncStatus = useFirebaseSync(state, setState);

  const toast = useCallback((msg) => {
    setToastMsg(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 2200);
  }, []);

  const actions = useMemo(() => ({
    toggleTheme: () => setState(s => ({ ...s, theme: s.theme === "dark" ? "light" : "dark" })),
    addTransaction: (tx) => setState(s => {
      const delta = tx.type === "gasto" ? -tx.amount : tx.amount;
      return {
        ...s,
        transactions: [tx, ...s.transactions],
        liquidez: s.liquidez + delta,
        ahorroAcumulado: tx.type === "ahorro" ? s.ahorroAcumulado + tx.amount : s.ahorroAcumulado
      };
    }),
    deleteTransaction: (id) => setState(s => {
      const tx = s.transactions.find(t => t.id === id);
      if (!tx) return s;
      const delta = tx.type === "gasto" ? tx.amount : -tx.amount;
      return {
        ...s,
        transactions: s.transactions.filter(t => t.id !== id),
        liquidez: s.liquidez + delta,
        ahorroAcumulado: tx.type === "ahorro" ? s.ahorroAcumulado - tx.amount : s.ahorroAcumulado
      };
    }),
    togglePending: (id) => setState(s => {
      const item = s.pending.find(p => p.id === id);
      if (!item) return s;
      const willBeDone = !item.done;
      let liquidez = s.liquidez, deudaTotal = s.finance.deudaTotal, ahorroAcumulado = s.ahorroAcumulado;
      if (item.amount != null) {
        const applied = willBeDone ? 1 : -1;
        liquidez += item.amount * applied;
        if (item.affects === "deuda") deudaTotal -= Math.abs(item.amount) * applied;
        if (item.affects === "ahorro") ahorroAcumulado += Math.abs(item.amount) * applied;
      }
      return {
        ...s,
        liquidez, ahorroAcumulado,
        finance: { ...s.finance, deudaTotal },
        pending: s.pending.map(p => p.id === id ? { ...p, done: willBeDone } : p)
      };
    }),
    contributeGoal: (id, amount) => setState(s => ({
      ...s,
      liquidez: s.liquidez - amount,
      ahorroAcumulado: s.ahorroAcumulado + amount,
      goals: s.goals.map(g => g.id === id ? { ...g, saved: g.saved + amount } : g)
    })),
    addGoal: (payload) => setState(s => ({ ...s, goals: [...s.goals, { id: uid(), name: payload.name, target: payload.target, saved: 0 }] })),
    addWish: (payload) => setState(s => ({ ...s, wishlist: [...s.wishlist, { id: uid(), name: payload.name, category: payload.category || "General", price: payload.target }] })),
    deleteWish: (id) => setState(s => ({ ...s, wishlist: s.wishlist.filter(w => w.id !== id) })),
    addFuel: (payload) => setState(s => {
      const prev = s.fuelLogs[0];
      const kml = prev && payload.odometer > prev.odometer ? Number(((payload.odometer - prev.odometer) / payload.liters).toFixed(1)) : Number((11 + Math.random() * 3).toFixed(1));
      const entry = { id: uid(), date: todayISO(), liters: payload.liters, cost: payload.cost, odometer: payload.odometer, kml };
      return {
        ...s,
        fuelLogs: [entry, ...s.fuelLogs],
        liquidez: s.liquidez - payload.cost,
        tankPct: 100,
        transactions: [{ id: uid(), date: todayISO(), desc: "Carga de gasolina", category: "Transporte", type: "gasto", amount: payload.cost }, ...s.transactions]
      };
    }),
    addCategory: (name) => setState(s => ({ ...s, categories: [...s.categories, name] })),
    removeCategory: (name) => setState(s => ({ ...s, categories: s.categories.filter(c => c !== name) })),
    addBudget: (payload) => setState(s => ({ ...s, budgets: [...s.budgets, { id: uid(), category: payload.category, amount: payload.amount }] })),
    setPlannerPct: (key, value) => setState(s => ({ ...s, planner: { ...s.planner, [key]: value } })),
    applyPlanToBudget: (montoMetas, montoAhorro, montoDeseos) => setState(s => ({
      ...s,
      budgets: s.budgets.map(b => {
        if (b.category === "Ahorro") return { ...b, amount: montoAhorro };
        return b;
      })
    })),
    replaceState: (newState) => setState(() => ({ ...seedData(), ...newState })),
    wipeAll: () => setState(() => seedData())
  }), []);

  return (
    <div className="cfo-root" data-theme={state.theme}>
      <div className="cfo-shell">
        <aside className="cfo-sidebar" style={{ flexDirection: "column", width: 272, flex: "0 0 272px", padding: "28px 18px 20px 26px", borderRight: "1px solid var(--border)" }}>
          <div className="cfo-serif" style={{ fontSize: 23, fontWeight: 500, letterSpacing: "-0.01em", color: "var(--primary)" }}>CFO Personal</div>
          <div style={{ fontSize: 10.5, letterSpacing: "0.09em", textTransform: "uppercase", color: "var(--muted-light)", marginBottom: 30 }}>Finanzas de un solo usuario</div>
          {["Diario","Planeación","Sistema"].map(group => (
            <React.Fragment key={group}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--muted-light)", margin: "0 0 8px 14px" }}>{group}</div>
              {TABS.filter(t => t.group === group).map(t => (
                <button key={t.key} className="cfo-btn" onClick={() => setTab(t.key)}
                  style={{ display: "flex", alignItems: "center", padding: "11px 14px", borderRadius: 9, fontSize: 14.5,
                    background: tab === t.key ? "var(--primary)" : "none", color: tab === t.key ? "var(--on-primary)" : "var(--muted)",
                    marginBottom: 3, width: "100%", textAlign: "left" }}>
                  {t.label}
                </button>
              ))}
              {group !== "Sistema" && <div style={{ marginTop: 6 }}></div>}
            </React.Fragment>
          ))}
          <div style={{ marginTop: "auto", paddingTop: 20, borderTop: "1px solid var(--border-soft)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 12, color: "var(--muted)" }}>Quincena · día {state.quincena.day}/{state.quincena.total}</span>
          </div>
        </aside>

        <div className="cfo-topbar" style={{ alignItems: "center", justifyContent: "space-between", padding: "16px 18px", borderBottom: "1px solid var(--border)" }}>
          <div className="cfo-serif" style={{ fontSize: 19, fontWeight: 500, color: "var(--primary)" }}>CFO Personal</div>
          <div style={{ display: "flex", gap: 6 }}>
            <button className="cfo-btn" onClick={actions.toggleTheme}
              style={{ width: 34, height: 34, borderRadius: 9, background: "var(--surface-alt)", border: "1px solid var(--border)", color: "var(--text)", fontSize: 14 }}>◐</button>
          </div>
        </div>

        <main className="cfo-main">
          {tab === "hoy" && <HoyScreen state={state} actions={actions} />}
          {tab === "movimientos" && <MovimientosScreen state={state} actions={actions} />}
          {tab === "metas" && <MetasWishlistScreen state={state} actions={actions} />}
          {tab === "presupuesto" && <PresupuestoScreen state={state} actions={actions} />}
          {tab === "gasolina" && <GasolinaScreen state={state} actions={actions} />}
          {tab === "datos" && <DatosScreen state={state} actions={actions} toast={toast} syncStatus={syncStatus} />}
        </main>
      </div>

      <div className="cfo-bottomnav" style={{ position: "sticky", bottom: 0, left: 0, right: 0, justifyContent: "space-around", alignItems: "center", background: "var(--surface)", borderTop: "1px solid var(--border)", borderRadius: "0 0 18px 18px", padding: "10px 6px" }}>
        {TABS.map(t => (
          <button key={t.key} className="cfo-btn" onClick={() => setTab(t.key)}
            style={{ background: "none", color: tab === t.key ? "var(--primary)" : "var(--muted-light)", fontSize: 11.5, fontWeight: tab === t.key ? 700 : 500 }}>
            {t.short}
          </button>
        ))}
      </div>

      <Toast message={toastMsg} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
