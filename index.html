function fmtDateLabel(iso) {
  const d = new Date(iso + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const dISO = d.toISOString().slice(0,10);
  const tISO = today.toISOString().slice(0,10);
  const yISO = yesterday.toISOString().slice(0,10);
  const weekday = d.toLocaleDateString("es-MX", { weekday: "long" });
  const day = d.getDate();
  const month = d.toLocaleDateString("es-MX", { month: "short" }).replace(".", "");
  const suffix = weekday + " " + day + " " + month;
  if (dISO === tISO) return "Hoy · " + suffix;
  if (dISO === yISO) return "Ayer · " + suffix;
  return suffix.charAt(0).toUpperCase() + suffix.slice(1);
}

function toBusinessDay(d) {
  const day = d.getDay(); // 0 = domingo, 6 = sábado
  if (day === 6) { const r = new Date(d); r.setDate(r.getDate() - 1); return r; }
  if (day === 0) { const r = new Date(d); r.setDate(r.getDate() - 2); return r; }
  return d;
}
function getQuincenaRange(today) {
  const y = today.getFullYear(), m = today.getMonth(), dom = today.getDate();
  let start, end;
  if (dom < PAY_DAYS[0]) { start = new Date(y, m - 1, PAY_DAYS[1]); end = new Date(y, m, PAY_DAYS[0]); }
  else if (dom < PAY_DAYS[1]) { start = new Date(y, m, PAY_DAYS[0]); end = new Date(y, m, PAY_DAYS[1]); }
  else { start = new Date(y, m, PAY_DAYS[1]); end = new Date(y, m + 1, PAY_DAYS[0]); }
  return { start: toBusinessDay(start), end: toBusinessDay(end) };

  const y = today.getFullYear(), m = today.getMonth(), dom = today.getDate();

  if (dom < PAY_DAYS[1]) return toBusinessDay(new Date(y, m, PAY_DAYS[1]));
  return toBusinessDay(new Date(y, m + 1, PAY_DAYS[0]));
}

function loadLocalState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedData();
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.transactions) return seedData();
    return Object.assign(seedData(), parsed);
  } catch (e) { return seedData(); }
}

function saveLocalState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

// ---------- Firebase (Firestore) sync ----------
// Un solo documento con todo el estado — simple y suficiente para un solo usuario.
let _fbApp = null;
function getDb() {
  if (typeof firebase === "undefined") return null;
  if (_fbApp) return firebase.firestore(_fbApp);
  try {
    try { _fbApp = firebase.app(); }
    catch (e) { _fbApp = firebase.initializeApp(FIREBASE_CONFIG); }
    return firebase.firestore(_fbApp);
  } catch (e) { console.error("Firebase init:", e.message); return null; }
}

function useFirebaseSync(state, setState) {
  const [syncStatus, setSyncStatus] = useState({ connected: false, syncing: false, lastSyncedAt: null, error: null });
  const lastWriteTs = useRef(0);
  const writeTimer = useRef(null);
  const firstSnapshot = useRef(true);

  // Suscripción en tiempo real: al montar, y cada vez que cambie el doc remoto.
  useEffect(() => {
    const db = getDb();
    if (!db) { setSyncStatus(s => ({ ...s, connected: false, error: "Sin conexión a Firestore" })); return; }
    const ref = db.collection(FIRESTORE_COLLECTION).doc(FIRESTORE_DOC_ID);
    const unsub = ref.onSnapshot(
      (doc) => {
        setSyncStatus(s => ({ ...s, connected: true, error: null }));
        if (!doc.exists) { firstSnapshot.current = false; return; }
        const data = doc.data();
        if (!data || !data.value) { firstSnapshot.current = false; return; }
        // Ignora el eco de nuestra propia escritura reciente.
        if (data.ts && data.ts <= lastWriteTs.current) { firstSnapshot.current = false; return; }
        try {
          const remote = JSON.parse(data.value);
          setState(remote);
          setSyncStatus(s => ({ ...s, lastSyncedAt: Date.now() }));
        } catch (e) {}
        firstSnapshot.current = false;
      },
      (err) => {
        setSyncStatus(s => ({ ...s, connected: false, error: err.message }));
      }
    );
    return () => unsub();
    // eslint-disable-next-line
  }, []);

  // Escritura con debounce cada vez que cambia el estado local.
  useEffect(() => {
    const db = getDb();
    if (!db) return;
    if (writeTimer.current) clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(() => {
      const ts = Date.now();
      lastWriteTs.current = ts;
      setSyncStatus(s => ({ ...s, syncing: true }));
      db.collection(FIRESTORE_COLLECTION).doc(FIRESTORE_DOC_ID)
        .set({ value: JSON.stringify(state), ts })
        .then(() => setSyncStatus(s => ({ ...s, syncing: false, connected: true, lastSyncedAt: Date.now(), error: null })))
        .catch((err) => setSyncStatus(s => ({ ...s, syncing: false, error: err.message })));
    }, 400);
    return () => clearTimeout(writeTimer.current);
  }, [state]);

  return syncStatus;
}

function fmtRelativeTime(ts) {
  if (!ts) return "nunca";
  const diffMs = Date.now() - ts;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "justo ahora";
  if (mins === 1) return "hace 1 min";
  if (mins < 60) return "hace " + mins + " min";
  const hrs = Math.floor(mins / 60);
  if (hrs === 1) return "hace 1 hora";
  return "hace " + hrs + " horas";
}

function MovimientosScreen({ state, actions }) {
  const [query, setQuery] = useState("");
  const [activeCat, setActiveCat] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [visibleCount, setVisibleCount] = useState(25); // v4.5.11: paginación "ver más"

  const filtered = useMemo(() => {
    return state.transactions.filter(t => {
      if (activeCat && t.category !== activeCat) return false;
      if (query && !t.desc.toLowerCase().includes(query.toLowerCase())) return false;
      return true;
    });
  }, [state.transactions, query, activeCat]);

  // v4.5.11: al cambiar el filtro/búsqueda, reiniciar la cantidad visible
  useEffect(() => { setVisibleCount(25); }, [query, activeCat]);

  const sortedFiltered = useMemo(() =>
    filtered.slice().sort((a,b) => b.date.localeCompare(a.date) || 0), [filtered]);

  const visibleTx = sortedFiltered.slice(0, visibleCount);
  const hasMore = sortedFiltered.length > visibleCount;

  const groups = useMemo(() => {
    const byDate = {};
    visibleTx.forEach(t => {
      if (!byDate[t.date]) byDate[t.date] = [];
      byDate[t.date].push(t);
    });
    return Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(d => ({ date: d, items: byDate[d] }));
  }, [visibleTx]);

  return (
    <div data-screen-label="Movimientos" style={{ position: "relative" }}>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", marginBottom: 14 }}>
        <input placeholder="Buscar movimiento..." value={query} onChange={e => setQuery(e.target.value)}
          style={{ flex: 1, minWidth: 160, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 9, padding: "10px 14px", fontSize: 13, color: "var(--text)" }} />
        <button className="cfo-btn" onClick={() => setShowAdd(true)} style={{ background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, padding: "10px 18px", fontSize: 13, whiteSpace: "nowrap" }}>+ Agregar transacción</button>
      </div>
      <div className="cfo-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 18, paddingBottom: 2 }}>
        {state.categories.map(c => (
          <div key={c} onClick={() => setActiveCat(activeCat === c ? null : c)}
            style={{ cursor: "pointer", fontSize: 12, padding: "6px 14px", borderRadius: 99, background: activeCat === c ? "var(--primary)" : "var(--surface-alt)", color: activeCat === c ? "var(--on-primary)" : "var(--text)", border: "1px solid var(--border)", whiteSpace: "nowrap" }}>
            {c}
          </div>
        ))}
      </div>

      {groups.length === 0 && <div style={{ fontSize: 13, color: "var(--muted)", textAlign: "center", padding: "40px 0" }}>Sin movimientos que coincidan.</div>}

      {groups.map(g => {
        const subtotal = g.items.reduce((a,b) => a + (b.type === "gasto" ? -b.amount : b.amount), 0);
        return (
          <div key={g.date} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--muted)" }}>{fmtDateLabel(g.date)}</div>
              <div className="cfo-mono" style={{ fontSize: 12.5, color: "var(--muted)" }}>Subtotal {fmtMoney(subtotal)}</div>
            </div>
            <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
              {g.items.map((t, i) => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: i < g.items.length - 1 ? "1px solid var(--border-soft)" : "none" }}>
                  <div style={{ width: 34, height: 34, borderRadius: 9, background: "var(--surface-alt)", flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{categoryIcon(t.category)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>{t.desc}</div>
                    <div style={{ fontSize: 11.5, color: "var(--muted)" }}>{t.category}</div>
                  </div>
                  <div className="cfo-mono" style={{ fontSize: 13.5, color: t.type === "gasto" ? "var(--danger)" : "var(--success)", whiteSpace: "nowrap" }}>
                    {t.type === "gasto" ? "-" : "+"}{fmtMoney(t.amount)}
                  </div>
                  <button className="cfo-btn" onClick={() => actions.deleteTransaction(t.id)} title="Eliminar"
                    style={{ background: "none", color: "var(--muted-light)", fontSize: 16, padding: "0 4px", lineHeight: 1 }}>×</button>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {hasMore && (
        <button className="cfo-btn" onClick={() => setVisibleCount(c => c + 25)}
          style={{ width: "100%", background: "var(--surface)", border: "1px solid var(--border)", color: "var(--text)",
            borderRadius: 10, padding: 12, fontSize: 13, fontWeight: 600, marginBottom: 8 }}>
          Ver más ({sortedFiltered.length - visibleCount} restantes)
        </button>
      )}

      {showAdd && <AddTransactionSheet categories={state.categories} onClose={() => setShowAdd(false)}
        onSave={(tx) => { actions.addTransaction(tx); setShowAdd(false); }} />}
    </div>
  );
}

      <div className="cfo-seg" style={{ width: "fit-content", marginBottom: 20 }}>
        <button className={gwSub === "metas" ? "active" : ""} onClick={() => setGwSub("metas")} style={{ padding: "9px 18px" }}>Metas · {state.goals.length}</button>
        <button className={gwSub === "wishlist" ? "active" : ""} onClick={() => setGwSub("wishlist")} style={{ padding: "9px 18px" }}>Wishlist · {state.wishlist.length}</button>
      </div>

      {gwSub === "metas" && (<div>
      <div style={sectionHeaderStyle}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--muted)" }}>Metas · {state.goals.length} activa{state.goals.length === 1 ? "" : "s"}</div>
        <button className="cfo-btn" onClick={() => setAddSheet("goal")} style={ghostBtnStyle}>+ Nueva meta</button>
      </div>
      <div className="cfo-goalgrid" style={{ marginBottom: 28 }}>
        {state.goals.map(g => {
          const pct = g.target > 0 ? Math.min(100, Math.round((g.saved / g.target) * 100)) : 0;
          const remaining = Math.max(0, g.target - g.saved);
          const today = new Date(); today.setHours(0,0,0,0);
          const targetD = g.targetDate ? new Date(g.targetDate + "T00:00:00") : null;
          const daysLeft = targetD ? Math.ceil((targetD - today) / 86400000) : null;
          const quincenasLeft = daysLeft != null ? Math.max(1, Math.ceil(daysLeft / 15)) : null;
          const aporteSugerido = quincenasLeft ? remaining / quincenasLeft : null;
          const isZero = pct === 0;
          const isDone = pct >= 100;
          return (
            <div key={g.id} className="cfo-goalcard" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{g.name}</div>
                <button className="cfo-btn cfo-goal-del" onClick={() => confirmDeleteGoal(g.id, g.name)} title="Eliminar"
                  style={{ background: "none", color: "var(--muted-light)", fontSize: 15, padding: 0, lineHeight: 1, flexShrink: 0 }}>×</button>
              </div>
              <div className="cfo-serif" style={{ fontSize: 32, fontWeight: 500, color: isZero ? "var(--muted-light)" : "var(--accent)", marginBottom: 10 }}>{pct}%</div>
              <div style={{ height: 8, borderRadius: 99, background: "var(--surface-alt)", overflow: "hidden", marginBottom: 10 }}>
                <div style={{ height: "100%", borderRadius: 99,
                  background: isZero ? "var(--muted-light)" : "linear-gradient(90deg,var(--primary),var(--accent))",
                  boxShadow: isZero ? "none" : "rgba(180,131,42,0.5) 0 0 10px",
                  width: (isZero ? 2 : pct) + "%" }}></div>
              </div>
              <div className="cfo-mono" style={{ fontSize: 12.5, marginBottom: 10 }}>
                <span style={{ color: "var(--text)" }}>{fmtMoney(g.saved)}</span> <span style={{ color: "var(--muted)" }}>de {fmtMoney(g.target)} ·</span> <span style={{ fontWeight: 600, color: "var(--muted)" }}>Faltan {fmtMoney(remaining)}</span>
              </div>
              {targetD && (
                <div style={{ fontSize: 11.5, color: daysLeft < 0 ? "var(--danger)" : "var(--muted)", marginBottom: 4 }}>
                  {daysLeft < 0 ? "Venció el " : "Vence el "}
                  {targetD.toLocaleDateString("es-MX", { day: "numeric", month: "short", year: "numeric" })}
                  {daysLeft >= 0 && " · " + daysLeft + " días"}
                </div>
              )}
              {aporteSugerido > 0 && remaining > 0 && (
                <div style={{ fontSize: 11.5, color: "var(--accent)", marginBottom: 12 }}>
                  Aporta ~{fmtMoney(aporteSugerido)} cada quincena para llegar a tiempo
                </div>
              )}
              {(!targetD || aporteSugerido == null) && <div style={{ marginBottom: 12 }}></div>}
              <div style={{ marginTop: "auto" }}>
                {isDone ? (
                  <div style={{ width: "100%", textAlign: "center", background: "var(--success-soft)", color: "var(--success)", borderRadius: 9, height: 36, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 600 }}>
                    ✓ Completada
                  </div>
                ) : (
                  <button className="cfo-btn" onClick={() => setContribGoal(g)}
                    style={{ width: "100%", height: 36, background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, fontSize: 13 }}>Aportar</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
      </div>)}

      {gwSub === "wishlist" && (<div>
      <div style={sectionHeaderStyle}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--muted)" }}>Wishlist · {state.wishlist.length} deseo{state.wishlist.length === 1 ? "" : "s"}</div>
        <button className="cfo-btn" onClick={() => setAddSheet("wish")} style={ghostBtnStyle}>+ Nuevo deseo</button>
      </div>
      <div className="cfo-goalgrid">
        {state.wishlist.map(w => (
          <div key={w.id} className="cfo-goalcard" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 18, gap: 10, position: "relative" }}>
            <button className="cfo-btn cfo-goal-del" onClick={() => confirmDeleteWish(w.id, w.name)} style={{ position: "absolute", top: 10, right: 12, background: "none", color: "var(--muted-light)", fontSize: 16 }}>×</button>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 38, height: 38, borderRadius: "50%", background: categoryColor(w.category), color: "var(--on-primary)", flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 600 }}>
                {String(w.name || "?").trim().charAt(0).toUpperCase()}
              </div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{w.name}</div>
                <div style={{ fontSize: 11, color: "var(--muted-light)" }}>{w.category || "General"}</div>
              </div>
            </div>
            <div className="cfo-mono" style={{ fontSize: 19, fontWeight: 500 }}>{fmtMoney(w.price)}</div>
            <div style={{ fontSize: 11.5, color: "var(--accent)", background: "var(--warn-soft)", display: "inline-block", padding: "3px 9px", borderRadius: 99, width: "fit-content" }}>
              {state.liquidez > 0 ? Math.round((w.price / state.liquidez) * 100) : 0}% de tu liquidez
            </div>
          </div>
        ))}
      </div>
      </div>)}

      {contribGoal && <ContributeSheet goal={contribGoal} onClose={() => setContribGoal(null)}
        onSave={(id, amount) => { actions.contributeGoal(id, amount); setContribGoal(null); }} />}
      {addSheet && <AddGoalSheet kind={addSheet} onClose={() => setAddSheet(null)}
        onSave={(payload) => { addSheet === "goal" ? actions.addGoal(payload) : actions.addWish(payload); setAddSheet(null); }} />}
    </div>
  );
}

// ---------- Presupuesto ----------

function AddBudgetSheet({ categories, onClose, onSave }) {
  const [category, setCategory] = useState(categories[0] || "");
  const [amount, setAmount] = useState("");
  function submit(e) {
    e.preventDefault();
    const n = parseFloat(amount);
    if (!category || !n || n <= 0) return;
    onSave({ category, amount: n });
  }
  return (
    <div className="cfo-overlay" onClick={onClose}>
      <div className="cfo-sheet" onClick={e => e.stopPropagation()}>
        <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>Nueva categoría de presupuesto</div>
        <form onSubmit={submit}>
          <select className="cfo-field" value={category} onChange={e => setCategory(e.target.value)}>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input className="cfo-field" type="number" step="0.01" min="0" placeholder="Monto presupuestado" value={amount} onChange={e => setAmount(e.target.value)} required />
          <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
            <button type="button" className="cfo-btn" onClick={onClose} style={{ flex: 1, background: "var(--surface-alt)", color: "var(--text)", borderRadius: 9, padding: 12, fontSize: 13 }}>Cancelar</button>
            <button type="submit" className="cfo-btn" style={{ flex: 1, background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, padding: 12, fontSize: 13 }}>Guardar</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function PresupuestoScreen({ state, actions, toast }) {
  const [sub, setSub] = useState("actual"); // 'actual' | 'planeador'
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState("");

  const today = new Date();
  const { start: qStart, end: qEnd } = getQuincenaRange(today);
  const qStartISO = qStart.toISOString().slice(0,10);
  const qEndISO = qEnd.toISOString().slice(0,10);

  const realByCategory = useMemo(() => {
    const map = {};
    state.transactions
      .filter(t => t.type === "gasto" && t.date >= qStartISO && t.date < qEndISO)
      .forEach(t => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return map;
  }, [state.transactions, qStartISO, qEndISO]);

  // Redondeado a 1 decimal para no depender de comparaciones de punto flotante
  // exactas (dos categorías al 100% real, ej. 20/20 y 100/100, deben caer en la
  // misma rama aunque la suma de transacciones arrastre imprecisión de floats).
  const rows = state.budgets.map(b => ({
    ...b,
    real: realByCategory[b.category] || 0,
    pct: b.amount > 0 ? Math.round((realByCategory[b.category] || 0) / b.amount * 1000) / 10 : 0
  }));
  const totalBudget = rows.reduce((s,r) => s + r.amount, 0);
  const totalReal = rows.reduce((s,r) => s + r.real, 0);

  // Proyección de la quincena en curso, según cuánto ha avanzado
  const diasTotalesQ = Math.max(1, Math.round((qEnd - qStart) / 86400000));
  const diasTranscurridos = Math.min(diasTotalesQ, Math.max(1, Math.round((today - qStart) / 86400000) + 1));
  const ritmo = totalReal / diasTranscurridos;
  const proyeccionGasto = Math.round(ritmo * diasTotalesQ);
  const ingresoEsperadoActual = state.finance.ingresoEsperadoQuincenal || 0;
  const proyeccionRestante = Math.round(ingresoEsperadoActual - proyeccionGasto);
  const diasRestantes = Math.max(0, diasTotalesQ - diasTranscurridos);

  // Semántica de color por categoría — Ahorro se invierte (pasarse de la meta es
  // positivo); el resto: verde <80%, dorado 80–100% (incluye el límite exacto), rojo >100%.
  function budgetRowStyle(r) {
    const isAhorro = /ahorro/i.test(r.category);
    if (isAhorro) {
      if (r.pct >= 100) {
        return { color: "var(--success)", text: Math.round(r.pct - 100) + "% sobre la meta ✓", bar: "var(--success)" };
      }
      const barA = r.pct >= 80 ? "var(--warn)" : "var(--success)";
      return { color: r.pct >= 80 ? "var(--warn)" : "var(--success)", text: Math.round(100 - r.pct) + "% para tu meta", bar: barA };
    }
    if (r.pct > 100) {
      return { color: "var(--danger)", text: Math.round(r.pct - 100) + "% sobre el presupuesto", bar: "var(--danger)" };
    }
    if (r.pct === 100) {
      return { color: "var(--warn)", text: "Al límite del presupuesto", bar: "var(--warn)" };
    }
    const bar = "linear-gradient(90deg, var(--success), var(--warn))";
    return { color: r.pct >= 80 ? "var(--warn)" : "var(--success)", text: Math.round(100 - r.pct) + "% disponible", bar };
  }

  function confirmDeleteBudget(id, category) {
    if (confirm("¿Eliminar el presupuesto de \"" + category + "\"? Esta acción no se puede deshacer.")) actions.deleteBudget(id);
  }

  function startEdit(r) { setEditingId(r.id); setEditValue(String(r.amount)); }

  /* v4.5.1: edición inline del planeador — idéntica en comportamiento a la del presupuesto */
  const [editingPlan, setEditingPlan] = useState(null); // { cat, field: "pct"|"amount" }
  const [planValue, setPlanValue] = useState("");
  function startEditPlan(cat, field, current) { setEditingPlan({ cat, field }); setPlanValue(String(current)); }
  function saveEditPlan() {
    if (!editingPlan) return;
    const n = parseFloat(planValue);
    if (!isNaN(n) && n >= 0) {
      if (editingPlan.field === "pct") setRowPct(editingPlan.cat, n);
      else setRowAmount(editingPlan.cat, n);
    }
    setEditingPlan(null);
  }
  function saveEdit() {
    const n = parseFloat(editValue);
    if (!isNaN(n) && n >= 0) actions.updateBudgetAmount(editingId, n);
    setEditingId(null);
  }

  // Planeador — precarga las categorías y montos desde el Presupuesto real
  // (state.budgets); el usuario puede ajustar cada una, y ese ajuste se guarda
  // en state.planner por categoría hasta que se aplique o se borre la categoría.
  // v4.5.11: se quita "Fijos + deuda" como campo aparte (la deuda ya es una
  // categoría más en la tabla). "Disponible proyectado" ahora es en vivo:
  // ingreso esperado − total ya planeado en la tabla de abajo.
  const ingresoEsperado = state.finance.ingresoEsperadoQuincenal || 0;
  const plannerRows = state.budgets.map(b => ({
    category: b.category,
    amount: state.planner[b.category] != null ? state.planner[b.category] : b.amount
  }));
  const totalPlanner = plannerRows.reduce((s,r) => s + r.amount, 0);
  const disponibleProyectado = ingresoEsperado - totalPlanner;
  const totalPct = ingresoEsperado > 0 ? Math.round((totalPlanner / ingresoEsperado) * 1000) / 10 : 0;

  function setRowAmount(category, amount) { actions.setPlannerAmount(category, Math.max(0, amount)); }
  function setRowPct(category, pct) { setRowAmount(category, Math.round(ingresoEsperado * pct / 100)); }

  const [editingFinance, setEditingFinance] = useState(null); // 'ingreso' | 'fijos' | null
  const [financeValue, setFinanceValue] = useState("");
  function startEditFinance(field, current) { setEditingFinance(field); setFinanceValue(String(current)); }
  function saveEditFinance(field) {
    const n = parseFloat(financeValue);
    if (!isNaN(n) && n >= 0) actions.updateFinance(field, n);
    setEditingFinance(null);
  }

  const nextDate = getNextQuincenaDate(today);
  const nextDateISO = nextDate.toISOString().slice(0,10);
  const nextLabel = "Próxima quincena · " + nextDate.toLocaleDateString("es-MX", { day: "numeric", month: "long" });
  const scheduled = state.plannerScheduled;

  return (
    <div data-screen-label="Presupuesto">
      <div className="cfo-seg" style={{ width: "fit-content", marginBottom: 20 }}>
        <button className={sub === "actual" ? "active" : ""} onClick={() => setSub("actual")} style={{ padding: "9px 18px" }}>Presupuesto actual</button>
        <button className={sub === "planeador" ? "active" : ""} onClick={() => setSub("planeador")} style={{ padding: "9px 18px" }}>Planeador</button>
      </div>

      {sub === "actual" && (
        <div>
          {/* v4.4: KPIs densos estilo CFO original */}
          <div className="cfo-kpigrid" style={{ marginBottom: 12 }}>
            <KPICard label="Presupuestado" value={fmtMoney(totalBudget)} valueSize={27} note="Total quincena" />
            <KPICard label="Ejecutado" value={fmtMoney(totalReal)} valueSize={27} note="Gastos reales" />
            <KPICard label="Diferencia" value={(totalBudget - totalReal >= 0 ? "+" : "−") + fmtMoney(Math.abs(totalBudget - totalReal))} valueSize={27}
              valueColor={totalBudget - totalReal >= 0 ? "var(--success)" : "var(--danger)"}
              note={totalBudget - totalReal >= 0 ? "Disponible" : "Excedido"} />
            <KPICard label="% Ejecución" value={totalBudget > 0 ? Math.round((totalReal / totalBudget) * 100) + "%" : "—"} valueSize={27}
              valueColor={totalReal > totalBudget ? "var(--danger)" : totalReal >= totalBudget * 0.8 ? "var(--warn)" : "var(--success)"}
              note="Sobre presupuesto" />
          </div>
          <div className="cfo-kpigrid" style={{ gridTemplateColumns: "1fr 1fr", marginBottom: 18 }}>
            <KPICard label="Proyectado a gastar esta quincena" value={fmtMoney(proyeccionGasto)} valueSize={27}
              note={"Llevas " + fmtMoney(totalReal) + " en " + diasTranscurridos + " de " + diasTotalesQ + " días"} />
            <KPICard label="Te quedaría proyectado" value={fmtMoney(proyeccionRestante)} valueSize={27}
              valueColor={proyeccionRestante >= 0 ? "var(--success)" : "var(--danger)"}
              note={"para " + diasRestantes + " día" + (diasRestantes === 1 ? "" : "s") + " restantes"} />
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--muted)" }}>Presupuesto por categoría</div>
            <button className="cfo-btn" onClick={() => setShowAdd(true)} style={{ background: "none", color: "var(--accent)", fontSize: 12.5 }}>+ Nueva categoría</button>
          </div>
          {/* v4.4: tabla densa estilo CFO original — Presupuesto editable (clic), Diferencia y % Desv. con signo */}
          <div className="cfo-tablewrap" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: "6px 16px 10px" }}>
            <table className="cfo-table" style={{ width: "100%", borderCollapse: "collapse", minWidth: 620 }}>
              <thead>
                <tr>
                  {["Categoría","Presupuesto","Real","Diferencia","% Desv.","Progreso"].map(h => (
                    <th key={h} style={{ textAlign: h === "Categoría" ? "left" : "right", padding: "12px 8px",
                      fontSize: 10.5, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase",
                      color: "var(--muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(r => {
                  const rs = budgetRowStyle(r);
                  const isEditing = editingId === r.id;
                  const isAhorro = /ahorro/i.test(r.category);
                  const diff = r.amount - r.real;
                  const diffPositivo = isAhorro ? diff <= 0 : diff >= 0; // en Ahorro, pasarse es bueno
                  const desv = r.amount > 0 ? ((r.real - r.amount) / r.amount) * 100 : 0;
                  return (
                    <tr key={r.id}>
                      <td style={{ padding: "11px 8px", fontSize: 13.5, fontWeight: 600, borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>{r.category}</td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>
                        {isEditing ? (
                          <input type="number" step="0.01" min="0" autoFocus value={editValue}
                            onChange={e => setEditValue(e.target.value)} onBlur={saveEdit}
                            onKeyDown={e => { if (e.key === "Enter") saveEdit(); if (e.key === "Escape") setEditingId(null); }}
                            className="cfo-mono"
                            style={{ width: 84, fontSize: 13, textAlign: "right", border: "1px solid var(--primary)", borderRadius: 6, padding: "2px 5px", background: "var(--bg)", color: "var(--text)" }} />
                        ) : (
                          <span onClick={() => startEdit(r)} title="Tocar para editar" style={{ cursor: "pointer", borderBottom: "1px dashed var(--border)" }}>{fmtMoney(r.amount)}</span>
                        )}
                        <button className="cfo-btn" onClick={() => confirmDeleteBudget(r.id, r.category)} title="Eliminar"
                          style={{ background: "none", color: "var(--muted-light)", fontSize: 13, padding: "0 0 0 7px", lineHeight: 1 }}>×</button>
                      </td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", color: rs.color, whiteSpace: "nowrap" }}>{fmtMoney(r.real)}</td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap",
                        color: diffPositivo ? "var(--success)" : "var(--danger)" }}>
                        {(diff >= 0 ? "+" : "−") + fmtMoney(Math.abs(diff))}
                      </td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 12.5, textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap",
                        color: (isAhorro ? desv >= 0 : desv <= 0) ? "var(--success)" : "var(--danger)" }}>
                        {(desv >= 0 ? "+" : "−") + Math.abs(desv).toFixed(1) + "%"}
                      </td>
                      <td style={{ padding: "11px 8px", borderBottom: "1px solid var(--border-soft)", minWidth: 130 }}>
                        <div style={{ height: 7, borderRadius: 99, background: "var(--surface-alt)", overflow: "hidden" }}>
                          <div style={{ height: "100%", width: Math.min(100, r.pct) + "%", borderRadius: 99, background: rs.bar }}></div>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {rows.length === 0 && (
                  <tr><td colSpan={6} style={{ fontSize: 13, color: "var(--muted)", textAlign: "center", padding: "30px 0" }}>Sin categorías presupuestadas todavía.</td></tr>
                )}
              </tbody>
            </table>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: "var(--surface-alt)", borderRadius: 12, fontWeight: 600, marginTop: 10 }}>
            <div className="cfo-serif" style={{ fontSize: 17 }}>Total</div>
            <div className="cfo-mono" style={{ fontSize: 21 }}>
              <span style={{ color: totalReal > totalBudget ? "var(--danger)" : "var(--success)" }}>{fmtMoney(totalReal)}</span>
              <span style={{ color: "var(--muted)" }}> / {fmtMoney(totalBudget)}</span>
            </div>
          </div>
        </div>
      )}

      {sub === "planeador" && (
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 22 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: 700, marginBottom: 6 }}>Planeador</div>
              <div className="cfo-serif" style={{ fontSize: 20, fontWeight: 500 }}>{nextLabel}</div>
            </div>
            <button className="cfo-btn" onClick={() => setShowAdd(true)}
              style={{ background: "var(--surface-alt)", color: "var(--text)", borderRadius: 9, padding: "8px 14px", fontSize: 12.5, fontWeight: 600 }}>
              + Agregar categoría
            </button>
          </div>

          <div className="cfo-kpigrid" style={{ gridTemplateColumns: "1fr", maxWidth: 260, marginBottom: 20 }}>
            {[
              { field: "ingresoEsperadoQuincenal", label: "Ingreso esperado", current: ingresoEsperado }
            ].map(f => (
              <div key={f.field} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, padding: 16 }}>
                <div style={{ fontSize: 11.5, color: "var(--muted)", marginBottom: 8 }}>{f.label}</div>
                {editingFinance === f.field ? (
                  <input type="number" step="0.01" min="0" autoFocus value={financeValue}
                    onChange={e => setFinanceValue(e.target.value)}
                    onBlur={() => saveEditFinance(f.field)}
                    onKeyDown={e => { if (e.key === "Enter") saveEditFinance(f.field); if (e.key === "Escape") setEditingFinance(null); }}
                    className="cfo-mono"
                    style={{ fontSize: 30, fontWeight: 500, width: "100%", border: "1px solid var(--primary)", borderRadius: 6, padding: "2px 6px", background: "var(--bg)", color: "var(--text)" }} />
                ) : (
                  <div className="cfo-serif cfo-mono" onClick={() => startEditFinance(f.field, f.current)} title="Tocar para editar"
                    style={{ fontSize: 30, fontWeight: 500, cursor: "pointer", borderBottom: "1px dashed var(--border)", width: "fit-content" }}>
                    {fmtMoney(f.current)}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 4 }}>Disponible proyectado</div>
            <div className="cfo-serif" style={{ fontSize: 30, fontWeight: 500,
              color: disponibleProyectado < 0 ? "var(--danger)" : "var(--success)" }}>
              {fmtMoney(disponibleProyectado)}
            </div>
          </div>

          {/* v4.5.1: tabla del planeador — estética y comportamiento IDÉNTICOS a la del
              Presupuesto actual: mismo contenedor, mismas cabeceras, mismos paddings y
              tipografías, y misma edición por clic (subrayado punteado → input). */}
          <div className="cfo-tablewrap" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: "6px 16px 10px" }}>
            <table className="cfo-table" style={{ width: "100%", borderCollapse: "collapse", minWidth: 620 }}>
              <thead>
                <tr>
                  {["Categoría","% asignado","Monto","$ / quincena actual","Del disponible"].map((h, i) => (
                    <th key={h} style={{ textAlign: i === 0 ? "left" : "right", padding: "12px 8px",
                      fontSize: 10.5, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase",
                      color: "var(--muted)", borderBottom: "1px solid var(--border)" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {plannerRows.map(r => {
                  const pct = ingresoEsperado > 0 ? Math.round((r.amount / ingresoEsperado) * 1000) / 10 : 0;
                  const actual = state.budgets.find(b => b.category === r.category);
                  const editPct = editingPlan && editingPlan.cat === r.category && editingPlan.field === "pct";
                  const editAmt = editingPlan && editingPlan.cat === r.category && editingPlan.field === "amount";
                  const inputStylePlan = { width: 74, fontSize: 13, textAlign: "right", border: "1px solid var(--primary)",
                    borderRadius: 6, padding: "2px 5px", background: "var(--bg)", color: "var(--text)" };
                  return (
                    <tr key={r.category}>
                      <td style={{ padding: "11px 8px", fontSize: 13.5, fontWeight: 600, borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>{r.category}</td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>
                        {editPct ? (
                          <input type="number" step="0.5" min="0" max="100" autoFocus value={planValue}
                            onChange={e => setPlanValue(e.target.value)} onBlur={saveEditPlan}
                            onKeyDown={e => { if (e.key === "Enter") saveEditPlan(); if (e.key === "Escape") setEditingPlan(null); }}
                            className="cfo-mono" style={inputStylePlan} />
                        ) : (
                          <span onClick={() => startEditPlan(r.category, "pct", pct)} title="Tocar para editar"
                            style={{ cursor: "pointer", borderBottom: "1px dashed var(--border)" }}>{pct}%</span>
                        )}
                      </td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>
                        {editAmt ? (
                          <input type="number" step="0.01" min="0" autoFocus value={planValue}
                            onChange={e => setPlanValue(e.target.value)} onBlur={saveEditPlan}
                            onKeyDown={e => { if (e.key === "Enter") saveEditPlan(); if (e.key === "Escape") setEditingPlan(null); }}
                            className="cfo-mono" style={{ ...inputStylePlan, width: 84 }} />
                        ) : (
                          <span onClick={() => startEditPlan(r.category, "amount", r.amount)} title="Tocar para editar"
                            style={{ cursor: "pointer", borderBottom: "1px dashed var(--border)" }}>{fmtMoney(r.amount)}</span>
                        )}
                      </td>
                      <td className="cfo-mono" style={{ padding: "11px 8px", fontSize: 13, textAlign: "right", borderBottom: "1px solid var(--border-soft)", color: "var(--muted)", whiteSpace: "nowrap" }}>
                        {actual ? fmtMoney(actual.amount) : "—"}
                      </td>
                      <td style={{ padding: "11px 8px", borderBottom: "1px solid var(--border-soft)", minWidth: 130 }}>
                        <div style={{ height: 7, borderRadius: 99, background: "var(--surface-alt)", overflow: "hidden" }}>
                          <div style={{ height: "100%", width: Math.min(100, pct) + "%", borderRadius: 99,
                            background: totalPct > 100 ? "var(--danger)" : "linear-gradient(90deg,var(--success),var(--warn))" }}></div>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {plannerRows.length === 0 && (
                  <tr><td colSpan={5} style={{ fontSize: 13, color: "var(--muted)", textAlign: "center", padding: "30px 0" }}>Agrega categorías en "Presupuesto actual" para repartir aquí.</td></tr>
                )}
              </tbody>
            </table>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", marginBottom: 18, borderTop: "1px solid var(--border-soft)", paddingTop: 14 }}>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>Total repartido</span>
            <span className="cfo-mono" style={{ fontWeight: 600,
              color: totalPct === 100 ? "var(--success)" : totalPct < 100 ? "var(--warn)" : "var(--danger)" }}>
              {fmtMoney(totalPlanner)} de {fmtMoney(ingresoEsperado)} · {totalPct}%
            </span>
          </div>

          {scheduled ? (
            <div style={{ background: "var(--warn-soft)", borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 180px", fontSize: 12.5, color: "var(--warn)" }}>
                Hay un plan guardado para el {new Date(scheduled.applyDate + "T00:00:00").toLocaleDateString("es-MX", { day: "numeric", month: "long" })}. ¿Sobrescribirlo con el actual?
              </div>
              <button className="cfo-btn" onClick={() => { actions.cancelScheduledPlan(); toast("Plan cancelado"); }}
                style={{ background: "var(--surface)", color: "var(--text)", border: "1px solid var(--border)", borderRadius: 9, padding: "10px 16px", fontSize: 13, fontWeight: 600 }}>
                Cancelar
              </button>
              <button className="cfo-btn" onClick={() => { actions.schedulePlan(nextDateISO, plannerRows); toast("Plan sobrescrito"); }}
                style={{ background: "var(--danger)", color: "var(--on-primary)", borderRadius: 9, padding: "10px 16px", fontSize: 13, fontWeight: 600 }}>
                Sobrescribir
              </button>
            </div>
          ) : (
            <button className="cfo-btn" onClick={() => { actions.schedulePlan(nextDateISO, plannerRows); toast("Plan guardado"); }}
              style={{ width: "100%", background: "var(--primary)", color: "var(--on-primary)", borderRadius: 9, padding: 13, fontSize: 13.5, fontWeight: 600 }}>
              📅 Guardar para el {nextDate.toLocaleDateString("es-MX", { day: "numeric", month: "short" })}
            </button>
          )}
        </div>
      )}

      {showAdd && <AddBudgetSheet categories={state.categories} onClose={() => setShowAdd(false)}
        onSave={(payload) => { actions.addBudget(payload); setShowAdd(false); }} />}
    </div>
  );
}

// Medidor en forma de media luna (semicírculo, lado plano hacia abajo) con 12
// divisiones — las marcas se reparten de -90° (izquierda) a +90° (derecha),
// pivotando desde el centro inferior del contenedor.
const TANK_LITERS = 70;
const GAUGE_BARS = 12;
const LITERS_PER_BAR = TANK_LITERS / GAUGE_BARS; // ~5.83L por rayita
const MI_TO_KM = 1.60934; // v4.4: el odómetro del Sonata está en MILLAS — todo km/L convierte primero

// v3.25.2 (restaurado): litros realmente consumidos en un tramo, corregidos por
// nivel de tanque (rayitas) en vez de asumir que "litros cargados" = "litros
// consumidos" — necesario porque las cargas suelen ser parciales.
// consumido = litros cargados + (nivel_anterior_después − nivel_actual_antes_de_cargar) × L/rayita.
// Si faltan rayitas en cualquiera de los dos registros, cae al método clásico (solo litros cargados).
function segmentLiters(prevBarsAfter, liters, barsBefore, barsAfter) {
  const curBefore = barsBefore != null ? barsBefore : (barsAfter != null ? barsAfter - liters / LITERS_PER_BAR : null);
  if (prevBarsAfter != null && curBefore != null) return Math.max(0, liters + (prevBarsAfter - curBefore) * LITERS_PER_BAR);
  return liters || null;
}

// Medidor en forma de media luna (semicírculo, lado plano hacia abajo) con 12
// divisiones — las marcas se reparten de -90° (izquierda) a +90° (derecha),
// pivotando desde el centro inferior del contenedor.
function FuelGauge({ pct, onTickClick }) {
  const R = 100;
  const ticks = [];
  const filled = Math.round((pct / 100) * 12);
  for (let i = 0; i < 12; i++) {
    const deg = -90 + i * (180 / 11);
    const active = i < filled;
    const idx = i;
    ticks.push(
      <div key={i} onClick={onTickClick ? () => onTickClick(idx + 1) : undefined}
        title={onTickClick ? "Ajustar a " + (idx + 1) + " rayitas" : undefined}
        style={{ position: "absolute", left: "50%", bottom: 0, width: 3, height: 17, borderRadius: 2,
        background: active ? "var(--accent)" : "var(--border)", cursor: onTickClick ? "pointer" : "default",
        transform: "translateX(-50%) translateY(-" + R + "px) rotate(" + deg + "deg)",
        transformOrigin: "50% " + R + "px" }}></div>
    );
  }
  return (
    <div style={{ position: "relative", width: 240, height: R + 30, flexShrink: 0 }}>
      {ticks}
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 6, display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div className="cfo-serif" style={{ fontSize: 36, fontWeight: 500, color: "var(--accent)" }}>{pct}%</div>
        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>del tanque</div>
      </div>
    </div>
  );
}

// Mini-gauge circular (conic-gradient) para las filas del historial.
function MiniGauge({ kml }) {
  const hasData = kml != null && kml > 0;
  const deg = hasData ? Math.min(360, Math.round((kml / 20) * 360)) : 0;
  const color = !hasData ? "var(--border)" : kml >= 10.5 ? "var(--success)" : kml >= 8 ? "var(--warn)" : "var(--danger)";
  return (
    <div style={{ width: 34, height: 34, borderRadius: "50%", flexShrink: 0,
      background: hasData ? ("conic-gradient(" + color + " " + deg + "deg, var(--surface-alt) 0)") : "var(--surface-alt)",
      border: hasData ? "none" : "1px dashed var(--border)" }}></div>
  );
}

function kmlColor(kml) {
  if (kml == null || kml <= 0) return "var(--muted-light)";
  if (kml >= 10.5) return "var(--success)";
  if (kml >= 8) return "var(--warn)";
  return "var(--danger)";
}

function tankStatus(pct) {
  if (pct >= 70) return { text: "Tanque lleno", color: "var(--success)" };
  if (pct >= 25) return { text: "Nivel medio", color: "var(--warn)" };
  return { text: "En reserva", color: "var(--danger)" };
}

const emptyFuelForm = { date: todayISO(), pricePerLiter: "", cost: "", odometer: "", barsBefore: "", barsAfter: "", station: "", notes: "" };

function GasolinaScreen({ state, actions }) {
  const [form, setForm] = useState(emptyFuelForm);
  const [showMore, setShowMore] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [esCarga, setEsCarga] = useState(true); /* v4.4: checkpoint de odómetro vs carga real */
  const [showForm, setShowForm] = useState(false); /* v4.5: registrar carga como desplegable */

  const logs = state.fuelLogs;
  const kmlValidos = logs.filter(f => f.kml && f.kml > 0);
  const kmlPromedio = kmlValidos.length ? (kmlValidos.reduce((a,b) => a + b.kml, 0) / kmlValidos.length) : 0;
  /* v4.3: km/L global REAL = km totales del período ÷ litros consumidos totales,
     ajustado por el nivel del tanque al inicio y al final (rayitas) cuando existe.
     Antes era un fake: promedio × 0.96. Igual el costo/km: gasto total ÷ km totales. */
  const globalStats = (() => {
    const withOdo = logs.filter(f => f.odometer != null && f.odometer > 0);
    if (withOdo.length < 2) return { kml: 0, costKm: 0 };
    const newest = withOdo[0], oldest = withOdo[withOdo.length - 1];
    const km = (newest.odometer - oldest.odometer) * MI_TO_KM; /* v4.4: mi→km */
    if (km <= 0) return { kml: 0, costKm: 0 };
    const between = logs.slice(0, logs.indexOf(oldest)); // cargas después de la más vieja (incluye la más nueva)
    const litersLoaded = between.reduce((a,f) => a + (Number(f.liters) || 0), 0);
    const lvlAdj = (oldest.barsAfter != null && newest.barsAfter != null)
      ? (oldest.barsAfter - newest.barsAfter) * LITERS_PER_BAR : 0;
    const consumed = litersLoaded + lvlAdj;
    const cost = between.reduce((a,f) => a + (Number(f.cost) || 0), 0);
    return { kml: consumed > 0 ? km / consumed : 0, costKm: cost > 0 ? cost / km : 0 };
  })();
  const kmlGlobal = globalStats.kml;
  const costoPorKm = globalStats.costKm;
  const currentBars = Math.round((state.tankPct / 100) * GAUGE_BARS * 2) / 2;
  const litersRemaining = currentBars * LITERS_PER_BAR;
  const autonomia = (kmlGlobal || kmlPromedio) ? Math.round(litersRemaining * (kmlGlobal || kmlPromedio)) : 0;
  const status = tankStatus(state.tankPct);

  function adjustBars(delta) {
    const next = Math.max(0, Math.min(GAUGE_BARS, Math.round((currentBars + delta) * 2) / 2));
    actions.setCurrentBars(next);
  }

  function updateField(key, val) { setForm(f => ({ ...f, [key]: val })); }

  /* v4.4: rayita estimada — millas desde el último registro → litros consumidos con el
     rendimiento real → rayitas gastadas desde el nivel actual (patrón del CFO original) */
  const lastOdo = logs.find(f => f.odometer != null && f.odometer > 0);
  const estimatedBars = (() => {
    const o = parseFloat(form.odometer);
    if (!o || !lastOdo || o <= lastOdo.odometer) return null;
    const kmDriven = (o - lastOdo.odometer) * MI_TO_KM;
    const rate = kmlGlobal || kmlPromedio || 10.5;
    const litersUsed = kmDriven / rate;
    return Math.max(0, Math.min(GAUGE_BARS, Math.round((currentBars - litersUsed / LITERS_PER_BAR) * 2) / 2));
  })();

  function submit(e) {
    e.preventDefault();
    const o = parseFloat(form.odometer);
    /* v4.5.11: ya no se pide "litros" directo — se calcula a partir de precio/L y monto
       pagado (litros = costo ÷ precio). Antes el input de litros usaba step="0.1", que
       HTML5 rechaza como "Invalid number" para valores con 2 decimales (ej. 55.71 L),
       que es justamente la precisión típica de un recibo de gasolinera. */
    const p = esCarga ? parseFloat(form.pricePerLiter) : 0;
    const c = esCarga ? parseFloat(form.cost) : 0;
    const l = esCarga && p > 0 ? c / p : 0;
    if (!o || (esCarga && (!p || !c))) return;
    const payload = {
      date: form.date || todayISO(),
      liters: l, cost: c, odometer: o,
      barsBefore: form.barsBefore !== "" ? parseInt(form.barsBefore, 10) : null,
      barsAfter: form.barsAfter !== "" ? parseInt(form.barsAfter, 10) : null,
      station: form.station.trim(),
      notes: form.notes.trim()
    };
    if (editingId) actions.updateFuel(editingId, payload);
    else actions.addFuel(payload);
    setForm(emptyFuelForm); setEditingId(null); setShowMore(false); setShowForm(false); /* v4.5 */
  }

  function startEdit(f) {
    setShowForm(true); /* v4.5 */
    setEditingId(f.id);
    // v4.5.11: al editar una carga vieja, el precio/L se deriva de costo÷litros ya guardados
    const derivedPrice = (f.liters && f.cost && f.liters > 0) ? (f.cost / f.liters) : "";
    setForm({
      date: f.date, pricePerLiter: derivedPrice !== "" ? String(derivedPrice.toFixed(3)) : "", cost: String(f.cost), odometer: f.odometer != null ? String(f.odometer) : "",
      barsBefore: f.barsBefore != null ? String(f.barsBefore) : "", barsAfter: f.barsAfter != null ? String(f.barsAfter) : "",
      station: f.station || "", notes: f.notes || ""
    });
    setShowMore(true);
  }

  function cancelEdit() { setEditingId(null); setForm(emptyFuelForm); setShowMore(false); setShowForm(false); }

  function confirmDelete(id) {
    if (confirm("¿Eliminar esta carga del historial? Esta acción no se puede deshacer.")) actions.deleteFuel(id);
  }

  const fieldStyle = { background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", fontSize: 13, color: "var(--text)" };

  return (
    <div data-screen-label="Gasolina">
      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 26, marginBottom: 18,
        display: "flex", alignItems: "center", gap: 28, flexWrap: "wrap" }}>
        <FuelGauge pct={state.tankPct} onTickClick={n => actions.setCurrentBars(n)} />
        <div style={{ flex: "1 1 200px", minWidth: 0 }}>
          <div className="cfo-serif" style={{ fontSize: 24, fontWeight: 500, color: status.color, marginBottom: 6, letterSpacing: "-0.01em" }}>{status.text}</div>
          <div className="cfo-mono" style={{ fontSize: 15, color: "var(--text)", marginBottom: 10 }}>
            {currentBars} de {GAUGE_BARS} rayitas · ~{litersRemaining.toFixed(1)} L
          </div>
          {autonomia > 0 && (
            <div style={{ display: "inline-block", fontSize: 12, fontWeight: 600, padding: "4px 12px", borderRadius: 99,
              background: "var(--warn-soft)", color: "var(--accent)", marginBottom: 14 }}>
              Autonomía ~{autonomia} km
            </div>
          )}
          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 6 }}>Ajustar nivel actual</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button type="button" className="cfo-btn" onClick={() => adjustBars(-0.5)}
              style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg)",
                color: "var(--text)", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1, padding: 0 }}>−</button>
            <span className="cfo-mono" style={{ fontSize: 13, minWidth: 30, textAlign: "center" }}>{currentBars}</span>
            <button type="button" className="cfo-btn" onClick={() => adjustBars(0.5)}
              style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg)",
                color: "var(--text)", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1, padding: 0 }}>+</button>
          </div>
        </div>
      </div>

      <div className="cfo-kpigrid" style={{ marginBottom: 24 }}>
        <KPICard label="km/L promedio" value={kmlPromedio ? kmlPromedio.toFixed(1) : "—"} valueSize={27} />
        <KPICard label="km/L global" value={kmlGlobal ? kmlGlobal.toFixed(1) : "—"} valueSize={27} />
        <KPICard label="Costo por km" value={costoPorKm ? "$" + costoPorKm.toFixed(2) : "—"} valueSize={27} />
        <KPICard label="Autonomía est." value={autonomia ? autonomia + " km" : "—"} valueSize={27}
          note="con el rendimiento global" noteColor="var(--muted)" />
      </div>

      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: showForm ? 20 : "14px 20px", marginBottom: 24 }}>
        {/* v4.5: desplegable — cerrado por defecto, un tap para abrir */}
        <div onClick={() => { if (!showForm) setShowForm(true); }}
          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: showForm ? "default" : "pointer", marginBottom: showForm ? 14 : 0 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600 }}>{editingId ? "Editar carga" : "Registrar carga"}</div>
          <button type="button" className="cfo-btn" onClick={e => { e.stopPropagation(); if (showForm) cancelEdit(); else setShowForm(true); }}
            style={{ background: showForm ? "var(--surface-alt)" : "var(--primary)", color: showForm ? "var(--text)" : "var(--on-primary)",
              borderRadius: 8, padding: "7px 14px", fontSize: 12.5 }}>
            {showForm ? "▾ Cerrar" : "＋ Nueva carga"}
          </button>
        </div>
        {showForm && (
        <form onSubmit={submit}>
          {/* v4.4: flujo del CFO original — fecha + odómetro primero, checkbox de carga */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10, marginBottom: 12, alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 5 }}>Fecha</div>
              <input value={form.date} onChange={e => updateField("date", e.target.value)} type="date" style={{ ...fieldStyle, width: "100%" }} />
            </div>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 5 }}>Odómetro (millas)</div>
              <input value={form.odometer} onChange={e => updateField("odometer", e.target.value)} type="number" step="any" min="0"
                placeholder={lastOdo ? "Último: " + lastOdo.odometer : "Ej: 663.5"} style={{ ...fieldStyle, width: "100%" }} />
            </div>
            <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: "pointer", paddingTop: 16 }}>
              <input type="checkbox" checked={esCarga} onChange={e => setEsCarga(e.target.checked)} style={{ width: 16, height: 16, accentColor: "var(--primary)" }} />
              Fue una carga de gasolina
            </label>
          </div>

          {estimatedBars != null && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", background: "var(--surface-alt)", borderRadius: 10, padding: "10px 14px", marginBottom: 12 }}>
              <span style={{ fontSize: 12, color: "var(--muted)" }}>Rayita estimada según lo recorrido:</span>
              <span className="cfo-mono" style={{ fontSize: 15, fontWeight: 600, color: "var(--accent)" }}>{estimatedBars} / {GAUGE_BARS}</span>
              <span style={{ fontSize: 11, color: "var(--muted-light)" }}>corrige abajo si no coincide con el tablero</span>
            </div>
          )}

          {esCarga && (

              <input value={form.cost} onChange={e => updateField("cost", e.target.value)} type="number" step="any" min="0" placeholder="Monto pagado ($)" style={fieldStyle} />

              <input value={form.station} onChange={e => updateField("station", e.target.value)} type="text" placeholder="Gasolinera (opcional)" style={fieldStyle} />

          {esCarga && (

                    style={{ width: 34, height: 30, borderRadius: 7, fontSize: 12.5, fontFamily: "IBM Plex Mono, monospace", cursor: "pointer",
                      border: "1px solid " + (form.barsBefore === String(n) ? "var(--primary)" : "var(--border)"),
                      background: form.barsBefore === String(n) ? "var(--primary)" : "var(--bg)",
                      color: form.barsBefore === String(n) ? "var(--on-primary)" : "var(--text)" }}>{n}</button>
                ))}
              </div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10, marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 5 }}>
                {esCarga ? "Rayita después de cargar" : "Rayita actual"}
              </div>
              <input value={form.barsAfter} onChange={e => updateField("barsAfter", e.target.value)} type="number" min="0" max={GAUGE_BARS} step="0.5"
                placeholder={estimatedBars != null ? "Estimada: " + estimatedBars : "0–" + GAUGE_BARS} style={{ ...fieldStyle, width: "100%" }} />
            </div>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 5 }}>Notas</div>
              <input value={form.notes} onChange={e => updateField("notes", e.target.value)} type="text" placeholder="Ej: tanque lleno…" style={{ ...fieldStyle, width: "100%" }} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button type="submit" className="cfo-btn" style={{ background: "var(--primary)", color: "var(--on-primary)", borderRadius: 8, padding: "10px 18px", fontSize: 13 }}>
              {editingId ? "Guardar cambios" : "Guardar"}
            </button>
            {editingId && (
              <button type="button" onClick={cancelEdit} className="cfo-btn" style={{ background: "var(--surface-alt)", color: "var(--text)", borderRadius: 8, padding: "10px 18px", fontSize: 13 }}>
                Cancelar
              </button>
            )}
          </div>
        </form>
        )}
      </div>

      <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 12 }}>Historial de cargas ({logs.length})</div>
      {/* v4.4: tabla completa estilo CFO original */}
      <div className="cfo-tablewrap" style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: "4px 14px 8px" }}>
        <table className="cfo-table" style={{ width: "100%", borderCollapse: "collapse", minWidth: 680 }}>
          <thead>
            <tr>
              {["Fecha","Odómetro (mi)","Litros","Monto","$/L","Km/L","Rayitas","Gasolinera",""].map((h, i) => (
                <th key={i} style={{ textAlign: i === 0 || i === 7 ? "left" : "right", padding: "11px 8px",

            </tr>
          </thead>
          <tbody>
            {logs.map(f => {
              const ppl = f.liters > 0 && f.cost > 0 ? f.cost / f.liters : null;
              return (
                <tr key={f.id}>
                  <td style={{ padding: "10px 8px", fontSize: 12.5, borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>{fmtShortDate(f.date)}</td>

                  <td className="cfo-mono" style={{ padding: "10px 8px", fontSize: 12.5, textAlign: "right", borderBottom: "1px solid var(--border-soft)" }}>{f.liters > 0 ? f.liters + " L" : "—"}</td>
                  <td className="cfo-mono" style={{ padding: "10px 8px", fontSize: 12.5, textAlign: "right", borderBottom: "1px solid var(--border-soft)", fontWeight: 600 }}>{f.cost > 0 ? fmtMoney(f.cost) : "—"}</td>
                  <td className="cfo-mono" style={{ padding: "10px 8px", fontSize: 12, textAlign: "right", borderBottom: "1px solid var(--border-soft)", color: "var(--muted)" }}>{ppl ? "$" + ppl.toFixed(2) : "—"}</td>
                  <td className="cfo-mono" style={{ padding: "10px 8px", fontSize: 12.5, textAlign: "right", borderBottom: "1px solid var(--border-soft)", fontWeight: 600, color: kmlColor(f.kml) }}>{f.kml ? f.kml : "—"}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", borderBottom: "1px solid var(--border-soft)" }}>
                    {f.barsAfter != null ? (
                      <span style={{ display: "inline-flex", gap: 2, alignItems: "center" }} title={f.barsAfter + " de " + GAUGE_BARS}>
                        {Array.from({ length: GAUGE_BARS }).map((_, i) => (
                          <span key={i} style={{ width: 3, height: 11, borderRadius: 2,
                            background: i < f.barsAfter ? "var(--accent)" : "var(--surface-alt)" }}></span>
                        ))}
                      </span>
                    ) : <span style={{ color: "var(--muted-light)" }}>—</span>}
                  </td>
                  <td style={{ padding: "10px 8px", fontSize: 11.5, color: "var(--muted)", borderBottom: "1px solid var(--border-soft)", maxWidth: 110, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.station || "—"}</td>
                  <td style={{ padding: "10px 4px", textAlign: "right", borderBottom: "1px solid var(--border-soft)", whiteSpace: "nowrap" }}>
                    <button className="cfo-btn" onClick={() => startEdit(f)} title="Editar" style={{ background: "none", color: "var(--muted)", fontSize: 13, padding: "0 4px" }}>✎</button>
                    <button className="cfo-btn" onClick={() => confirmDelete(f.id)} title="Eliminar" style={{ background: "none", color: "var(--muted-light)", fontSize: 15, padding: "0 4px" }}>×</button>

          </tbody>
        </table>
      </div>
    </div>
  );
}

function DatosScreen({ state, actions, toast, syncStatus }) {
  const [newCat, setNewCat] = useState("");
  const fileInputRef = useRef(null);

  function addCategory() {
    const v = newCat.trim();
    if (!v || state.categories.includes(v)) return;
    actions.addCategory(v);
    setNewCat("");
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cfo-personal-backup-" + todayISO() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Respaldo exportado");
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== "object") throw new Error("bad file");
        actions.replaceState(parsed);
        toast("Respaldo importado");
      } catch (err) {
        toast("Archivo inválido");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function wipeAll() {
    if (!confirm("¿Borrar permanentemente todos tus datos de este dispositivo y de la nube? Esta acción no se puede deshacer.")) return;
    actions.wipeAll();
    toast("Datos eliminados");
  }

  return (
    <div data-screen-label="Datos y Configuracion">
      <div className="cfo-panelgrid">
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Apariencia</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>Tema {state.theme === "dark" ? "oscuro" : "claro"}</span>
            <button className="cfo-btn" onClick={actions.toggleTheme}
              style={{ width: 46, height: 26, borderRadius: 99, background: "var(--primary)", position: "relative", padding: 0 }}>
              <span style={{ position: "absolute", top: 3, left: state.theme === "dark" ? 23 : 3, width: 20, height: 20, borderRadius: "50%", background: "var(--on-primary)", transition: "left .15s" }}></span>
            </button>
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Categorías</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {state.categories.map(c => (
              <div key={c} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 99, background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", whiteSpace: "nowrap" }}>
                {c} <span onClick={() => actions.removeCategory(c)} style={{ cursor: "pointer", opacity: .5, marginLeft: 4 }}>×</span>
              </div>
            ))}
            <input value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => e.key === "Enter" && addCategory()}
              placeholder="+ Nueva" style={{ border: "1px dashed var(--border)", borderRadius: 99, padding: "5px 14px", fontSize: 12, color: "var(--muted)", background: "none", width: 90 }} />
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 8 }}>Recuperar datos anteriores</div>
          <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 12, lineHeight: 1.5 }}>
            Busca en Firestore los movimientos y cargas de gasolina guardados por la versión anterior del CFO y trae los que falten aquí (sin duplicar).
          </div>
          <button className="cfo-btn" onClick={actions.recoverLegacy}
            style={{ background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", borderRadius: 9, padding: "9px 16px", fontSize: 12.5 }}>
            ⟳ Buscar y recuperar
          </button>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Sincronización</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 9, height: 9, borderRadius: "50%", background: syncStatus.connected ? "var(--success)" : "var(--danger)" }}></div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>
              {syncStatus.connected
                ? "Conectado a Firestore · " + fmtRelativeTime(syncStatus.lastSyncedAt)
                : (syncStatus.error || "Sin conexión a Firestore")}
            </div>
          </div>
        </div>

        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 14 }}>Respaldo</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="cfo-btn" onClick={exportData} style={{ flex: 1, background: "var(--surface-alt)", color: "var(--text)", borderRadius: 8, padding: 10, fontSize: 12.5 }}>Exportar</button>
            <button className="cfo-btn" onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ flex: 1, background: "var(--surface-alt)", color: "var(--text)", borderRadius: 8, padding: 10, fontSize: 12.5 }}>Importar</button>
            <input ref={fileInputRef} type="file" accept="application/json" onChange={importData} style={{ display: "none" }} />
          </div>
        </div>
      </div>

      <div style={{ border: "1px solid var(--danger)", background: "var(--danger-soft)", borderRadius: 14, padding: 20, marginTop: 18 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--danger)", marginBottom: 8 }}>Zona de peligro</div>
        <div style={{ fontSize: 12.5, color: "var(--muted)", marginBottom: 14 }}>Borra permanentemente todos tus datos financieros de este dispositivo y de Firestore. No hay forma de recuperarlos.</div>
        <button className="cfo-btn" onClick={wipeAll} style={{ background: "var(--danger)", color: "#fff", borderRadius: 8, padding: "10px 16px", fontSize: 12.5 }}>Eliminar todos los datos</button>
      </div>
    </div>
  );
}
