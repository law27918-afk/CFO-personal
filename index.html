];

function App() {
  const [state, setState] = useState(loadLocalState);
  const [tab, setTab] = useState("hoy");
  const [toastMsg, setToastMsg] = useState("");
  const toastTimer = useRef(null);

  useEffect(() => { saveLocalState(state); }, [state]);
  // v4.5.11: sincroniza el fondo real de <body> con el color de fondo del tema activo.
  // Sin esto, el rebote elástico de Safari en iOS (o el toolbar dinámico colapsando)
  // puede exponer el fondo fijo de <body> por debajo de .cfo-root — si ese fondo no
  // coincide con el tema, se ve un parche negro/gris feo en vez de continuar el color.
  useEffect(() => {
    const bg = state.theme === "dark" ? "#14180F" : "#F4F1E9";
    document.body.style.background = bg;
    document.documentElement.style.background = bg; // v4.5.11: antes solo <body>, <html> quedaba sin fondo propio
  }, [state.theme]);
  const syncStatus = useFirebaseSync(state, setState);

  const toast = useCallback((msg) => {
    setToastMsg(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 2200);
  }, []);

  /* v4.5: recuperación de datos del CFO original.
     La versión anterior guardaba en Firestore documentos por clave en la colección
     "cfo_data" (ids tipo "cfo_user__<clave>", con {key, value: JSON, ts}). Esta rutina
     lee TODOS esos documentos, detecta por FORMA qué contienen (transacciones, cargas de
     gasolina) y fusiona lo que falte en el estado actual, sin duplicar ni sobrescribir. */
  const recoverLegacy = async () => {
    const db = getDb();
    if (!db) { alert("Sin conexión a Firestore."); return; }
    try {
      const snap = await db.collection("cfo_data").get();
      let legacyTx = [], legacyFuel = [];
      snap.forEach(doc => {
        const d = doc.data();
        if (!d || !d.value) return;
        let v; try { v = JSON.parse(d.value); } catch (e) { return; }
        if (!Array.isArray(v) || !v.length) return;
        const sample = v[0] || {};
        if (sample.amount != null && sample.date && (sample.type || sample.category)) legacyTx = legacyTx.concat(v);
        else if (sample.liters != null || sample.odometer != null) legacyFuel = legacyFuel.concat(v);
      });
      setState(s => {
        // Transacciones: dedupe por id, y por (fecha+monto+descripción) contra las actuales
        const txKey = t => (t.date || "") + "|" + Number(t.amount) + "|" + String(t.description || t.desc || "").trim().toLowerCase();
        const haveTx = new Set(s.transactions.map(txKey));
        const haveTxIds = new Set(s.transactions.map(t => t.id));
        const newTx = legacyTx
          .filter(t => t && t.date && t.amount != null && !haveTxIds.has(t.id) && !haveTx.has(txKey(t)))
          .map(t => ({
            id: t.id || uid(), date: t.date, type: t.type || "Gasto",
            category: t.category || "Otros", description: t.description || t.desc || "",
            method: t.method || t.metodo || "Débito", amount: Number(t.amount) || 0
          }));
        // Cargas: dedupe por (fecha+odómetro+litros)
        const fKey = f => (f.date || "") + "|" + (f.odometer != null ? f.odometer : "") + "|" + (Number(f.liters) || 0);
        const haveF = new Set(s.fuelLogs.map(fKey));
        const newFuel = legacyFuel
          .filter(f => f && f.date && !haveF.has(fKey(f)))
          .map(f => ({
            id: f.id || uid(), date: f.date,
            liters: Number(f.liters) || 0, cost: Number(f.amount != null ? f.amount : f.cost) || 0,
            odometer: f.odometer != null && f.odometer !== "" ? Number(f.odometer) : null,
            barsBefore: f.barsBefore != null ? f.barsBefore : null,
            barsAfter: f.barsAfter != null ? f.barsAfter : null,
            station: f.station || "", notes: f.notes || "", kml: null
          }));
        // Fusionar y ordenar (recientes primero), recalculando la cadena de km/L
        const mergedFuel = [...s.fuelLogs, ...newFuel]
          .sort((a,b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.odometer||0) - (b.odometer||0)));
        let prevOdo = null, prevBarsAfter = null;
        const recomputed = mergedFuel.map(f => {
          let kml = null;
          if (f.odometer != null && prevOdo != null && f.odometer > prevOdo) {
            const consumed = segmentLiters(prevBarsAfter, f.liters, f.barsBefore, f.barsAfter) || f.liters;
            if (consumed > 0 && f.liters > 0) {
              const v = ((f.odometer - prevOdo) * MI_TO_KM) / consumed;
              kml = (v > 0 && v < 30) ? Number(v.toFixed(1)) : null;
            }
          }
          if (f.odometer != null) prevOdo = f.odometer;
          if (f.barsAfter != null) prevBarsAfter = f.barsAfter;
          return { ...f, kml };
        }).reverse();
        const mergedTx = [...s.transactions, ...newTx]
          .sort((a,b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
        alert("Recuperado de la versión anterior: " + newTx.length + " movimiento(s) y " + newFuel.length + " carga(s) de gasolina.");
        return { ...s, transactions: mergedTx, fuelLogs: recomputed };
      });
    } catch (e) { alert("No se pudo leer la colección anterior: " + e.message); }
  };

  const actions = useMemo(() => ({
    recoverLegacy,
    toggleTheme: () => setState(s => ({ ...s, theme: s.theme === "dark" ? "light" : "dark" })),
    addTransaction: (tx) => setState(s => {
      const delta = tx.type === "gasto" ? -tx.amount : tx.amount;
      return {
        ...s,
        transactions: [tx, ...s.transactions],
        liquidez: s.liquidez + delta,
        ahorroAcumulado: tx.type === "ahorro" ? s.ahorroAcumulado + tx.amount : s.ahorroAcumulado
      };
    }),
    deleteTransaction: (id) => setState(s => {
      const tx = s.transactions.find(t => t.id === id);
      if (!tx) return s;
      const delta = tx.type === "gasto" ? tx.amount : -tx.amount;
      return {
        ...s,
        transactions: s.transactions.filter(t => t.id !== id),
        liquidez: s.liquidez + delta,
        ahorroAcumulado: tx.type === "ahorro" ? s.ahorroAcumulado - tx.amount : s.ahorroAcumulado
      };
    }),
    togglePending: (id) => setState(s => {
      const item = s.pending.find(p => p.id === id);
      if (!item) return s;
      const willBeDone = !item.done;
      let liquidez = s.liquidez, deudaTotal = s.finance.deudaTotal, ahorroAcumulado = s.ahorroAcumulado;
      if (item.amount != null) {
        const applied = willBeDone ? 1 : -1;
        liquidez += item.amount * applied;
        if (item.affects === "deuda") deudaTotal -= Math.abs(item.amount) * applied;
        if (item.affects === "ahorro") ahorroAcumulado += Math.abs(item.amount) * applied;
      }
      return {
        ...s,
        liquidez, ahorroAcumulado,
        finance: { ...s.finance, deudaTotal },
        pending: s.pending.map(p => p.id === id ? { ...p, done: willBeDone } : p)
      };
    }),
    contributeGoal: (id, amount) => setState(s => ({
      ...s,
      liquidez: s.liquidez - amount,
      ahorroAcumulado: s.ahorroAcumulado + amount,
      goals: s.goals.map(g => g.id === id ? { ...g, saved: g.saved + amount } : g)
    })),
    addGoal: (payload) => setState(s => ({ ...s, goals: [...s.goals, { id: uid(), name: payload.name, target: payload.target, saved: 0, targetDate: payload.targetDate || null }] })),
    deleteGoal: (id) => setState(s => ({ ...s, goals: s.goals.filter(g => g.id !== id) })),
    addWish: (payload) => setState(s => ({ ...s, wishlist: [...s.wishlist, { id: uid(), name: payload.name, category: payload.category || "General", price: payload.target }] })),
    deleteWish: (id) => setState(s => ({ ...s, wishlist: s.wishlist.filter(w => w.id !== id) })),
    addFuel: (payload) => setState(s => {
      const prev = s.fuelLogs[0];
      const prevBarsAfter = prev && prev.barsAfter != null ? prev.barsAfter : null;
      // v3.25.2 (restaurado): el consumo real de un tramo se corrige por rayitas
      // cuando están disponibles, en vez de asumir que litros cargados = litros gastados.
      const consumed = segmentLiters(prevBarsAfter, payload.liters, payload.barsBefore, payload.barsAfter) || payload.liters;
      // v4.3: si no hay tramo válido, el km/L queda null (se muestra "—").
      // Antes se generaba un número ALEATORIO (11 + Math.random()*3): dato inventado.
      const kml = prev && prev.odometer != null && payload.odometer > prev.odometer && consumed > 0
        ? Number((((payload.odometer - prev.odometer) * MI_TO_KM) / consumed).toFixed(1)) : null; /* v4.4: mi→km */
      const date = payload.date || todayISO();
      const entry = {
        id: uid(), date, liters: payload.liters, cost: payload.cost, odometer: payload.odometer, kml,
        barsBefore: payload.barsBefore != null ? payload.barsBefore : null,
        barsAfter: payload.barsAfter != null ? payload.barsAfter : null,
        station: payload.station || "", notes: payload.notes || ""
      };
      // v4.3: con rayitas después → nivel exacto; sin rayitas → nivel previo + litros
      // cargados convertidos a % del tanque (antes se asumía 100% aunque la carga fuera parcial).
      const tankPct = payload.barsAfter != null
        ? Math.round((payload.barsAfter / GAUGE_BARS) * 100)
        : Math.min(100, Math.round(s.tankPct + (payload.liters / TANK_LITERS) * 100));
      return {
        ...s,
        fuelLogs: [entry, ...s.fuelLogs],
        liquidez: s.liquidez - payload.cost,
        tankPct,
        transactions: [{ id: uid(), date, desc: "Carga de gasolina" + (entry.station ? " · " + entry.station : ""), category: "Transporte", type: "gasto", amount: payload.cost }, ...s.transactions]
      };
    }),
    updateFuel: (id, payload) => setState(s => ({
      ...s,
      fuelLogs: s.fuelLogs.map(f => f.id === id ? { ...f, ...payload } : f),
      // Si el registro editado es la carga más reciente y trae "rayitas después",
      // el tanque actual se sincroniza con ese valor (misma regla que al crear).
      tankPct: (s.fuelLogs[0] && s.fuelLogs[0].id === id && payload.barsAfter != null)
        ? Math.round((payload.barsAfter / GAUGE_BARS) * 100) : s.tankPct
    })),
    deleteFuel: (id) => setState(s => ({ ...s, fuelLogs: s.fuelLogs.filter(f => f.id !== id) })),
    setCurrentBars: (bars) => setState(s => ({ ...s, tankPct: Math.max(0, Math.min(100, Math.round((bars / GAUGE_BARS) * 100 * 10) / 10)) })),
    addCategory: (name) => setState(s => ({ ...s, categories: [...s.categories, name] })),
    removeCategory: (name) => setState(s => ({ ...s, categories: s.categories.filter(c => c !== name) })),
    addBudget: (payload) => setState(s => ({ ...s, budgets: [...s.budgets, { id: uid(), category: payload.category, amount: payload.amount }] })),
    deleteBudget: (id) => setState(s => ({ ...s, budgets: s.budgets.filter(b => b.id !== id) })),
    updateBudgetAmount: (id, amount) => setState(s => ({ ...s, budgets: s.budgets.map(b => b.id === id ? { ...b, amount } : b) })),
    // Monto del Planeador para una categoría (mirror dinámico del Presupuesto real).
    setPlannerAmount: (category, amount) => setState(s => ({ ...s, planner: { ...s.planner, [category]: amount } })),
    updateFinance: (field, value) => setState(s => ({ ...s, finance: { ...s.finance, [field]: value } })),
    // v4.1: en vez de aplicar de inmediato, el plan queda guardado y se aplica solo
    // cuando llega (o ya pasó) la fecha de la próxima quincena — ver useEffect en App.
    // rows: [{category, amount}] — una entrada por cada categoría presupuestada.
    schedulePlan: (applyDate, rows) => setState(s => ({ ...s, plannerScheduled: { applyDate, rows } })),
    cancelScheduledPlan: () => setState(s => ({ ...s, plannerScheduled: null })),
    replaceState: (newState) => setState(() => ({ ...seedData(), ...newState })),
    wipeAll: () => setState(() => seedData())
  }), []);

  // v4.1: aplica un plan guardado en cuanto se alcanza su fecha (revisa al montar
  // y una vez por minuto — cubre el caso de dejar la pestaña abierta hasta esa fecha).
  useEffect(() => {
    function checkScheduledPlan() {
      setState(s => {
        const sched = s.plannerScheduled;
        if (!sched || sched.applyDate > todayISO()) return s;
        return {
          ...s,
          plannerScheduled: null,
          budgets: s.budgets.map(b => {
            const row = sched.rows && sched.rows.find(r => r.category === b.category);
            return row ? { ...b, amount: row.amount } : b;
          })
        };
      });
    }
    checkScheduledPlan();
    const id = setInterval(checkScheduledPlan, 60000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="cfo-root" data-theme={state.theme}>
      <div className="cfo-topbar" style={{ alignItems: "center", justifyContent: "space-between", padding: "16px 18px", borderBottom: "1px solid var(--border)" }}>
        <div className="cfo-serif" style={{ fontSize: 19, fontWeight: 500, color: "var(--primary)" }}>CFO Personal</div>
        <div style={{ display: "flex", gap: 6 }}>
          <button className="cfo-btn" onClick={actions.toggleTheme}
            style={{ width: 34, height: 34, borderRadius: 9, background: "var(--surface-alt)", border: "1px solid var(--border)", color: "var(--text)", fontSize: 14 }}>◐</button>
        </div>
      </div>

      <div className="cfo-shell">
        <aside className="cfo-sidebar" style={{ flexDirection: "column", width: 272, flex: "0 0 272px", padding: "28px 18px 20px 26px", borderRight: "1px solid var(--border)" }}>
          <div className="cfo-serif" style={{ fontSize: 23, fontWeight: 500, letterSpacing: "-0.01em", color: "var(--primary)" }}>CFO Personal</div>
          <div style={{ fontSize: 10.5, letterSpacing: "0.09em", textTransform: "uppercase", color: "var(--muted-light)", marginBottom: 30 }}>Finanzas de un solo usuario</div>
          {["Diario","Planeación","Sistema"].map(group => (
            <React.Fragment key={group}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--muted-light)", margin: "0 0 8px 14px" }}>{group}</div>
              {TABS.filter(t => t.group === group).map(t => (
                <button key={t.key} className="cfo-btn" onClick={() => setTab(t.key)}
                  style={{ display: "flex", alignItems: "center", padding: "11px 14px", borderRadius: 9, fontSize: 14.5,
                    background: tab === t.key ? "var(--primary)" : "none", color: tab === t.key ? "var(--on-primary)" : "var(--muted)",
                    marginBottom: 3, width: "100%", textAlign: "left" }}>
                  {t.label}
                </button>
              ))}
              {group !== "Sistema" && <div style={{ marginTop: 6 }}></div>}
            </React.Fragment>
          ))}
          <div style={{ marginTop: "auto", paddingTop: 20, borderTop: "1px solid var(--border-soft)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 12, color: "var(--muted)" }}>Quincena · día {state.quincena.day}/{state.quincena.total}</span>
          </div>
        </aside>

        <main className="cfo-main">
          {tab === "hoy" && <HoyScreen state={state} actions={actions} />}
          {tab === "movimientos" && <MovimientosScreen state={state} actions={actions} />}
          {tab === "metas" && <MetasWishlistScreen state={state} actions={actions} />}
          {tab === "presupuesto" && <PresupuestoScreen state={state} actions={actions} toast={toast} />}
          {tab === "gasolina" && <GasolinaScreen state={state} actions={actions} />}
          {tab === "datos" && <DatosScreen state={state} actions={actions} toast={toast} syncStatus={syncStatus} />}
        </main>
      </div>

      <div className="cfo-bottomnav" style={{ position: "fixed", left: 16, right: 16, bottom: "calc(14px + env(safe-area-inset-bottom, 0px))", zIndex: 50,
        justifyContent: "space-around", alignItems: "center", background: "var(--surface)", border: "1px solid var(--border)",
        borderRadius: 26, padding: "8px 6px", boxShadow: "var(--shadow-lg)" }}>
        {TABS.map(t => (
          <button key={t.key} className="cfo-btn" onClick={() => setTab(t.key)}
            style={{ background: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "5px 4px", minWidth: 46 }}>
            <span style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 38, height: 30, borderRadius: 14,
              background: tab === t.key ? "var(--surface-alt)" : "transparent", color: tab === t.key ? "var(--primary)" : "var(--muted-light)",
              transition: "background .15s" }}>
              <TabIcon name={t.key} active={tab === t.key} />
            </span>
            <span style={{ fontSize: 10, color: tab === t.key ? "var(--primary)" : "var(--muted-light)", fontWeight: tab === t.key ? 700 : 500 }}>
              {t.short}
            </span>
          </button>
        ))}
      </div>

      <Toast message={toastMsg} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
