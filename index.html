<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="theme-color" content="#065F46" />
<title>CFO Personal · Gestión Financiera</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
<style>
  /* ─── Reset ─── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* ─── Base ─── */
  body {
    background: #F8FAF9;
    color: #111827;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 14px;
    line-height: 1.5;
  }
  input, select, button, textarea { font-family: inherit; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #065F46 !important;
    box-shadow: 0 0 0 3px rgba(6,95,70,0.12);
  }
  button:focus-visible { outline: 2px solid #065F46; outline-offset: 2px; }

  /* ─── Scrollbars ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C9D8D3; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #9DB8B0; }

  /* ─── Loading ─── */
  .loading-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    font-family: 'Fraunces', Georgia, serif; color: #6B7280;
    padding: 24px; text-align: center;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid #D1FAE5; border-top-color: #065F46;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #FEF2F2; border: 1px solid #FECACA; padding: 20px; border-radius: 8px;
    max-width: 500px; font-family: 'IBM Plex Sans', sans-serif; text-align: left;
    color: #991B1B; font-size: 13px; line-height: 1.6;
  }

  /* ─── Layout grids ─── */
  .kpi-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
  .grid-2   { display: grid; gap: 16px; grid-template-columns: 2fr 1fr; }
  .grid-3   { display: grid; gap: 16px; grid-template-columns: repeat(3, 1fr); }
  .grid-4   { display: grid; gap: 12px; grid-template-columns: repeat(4, 1fr); }
  .form-grid-4  { display: grid; gap: 12px; grid-template-columns: repeat(4, 1fr); }
  .net-worth-form { display: grid; gap: 10px; grid-template-columns: 2fr 1fr 1fr auto; align-items: flex-end; }
  .sim-grid { display: grid; gap: 28px; grid-template-columns: 1fr 1fr; align-items: start; }

  /* ─── Cards ─── */
  .kpi-card {
    transition: box-shadow 150ms ease, transform 150ms ease;
  }
  .kpi-card:hover {
    box-shadow: 0 4px 16px rgba(6,95,70,0.1), 0 1px 4px rgba(0,0,0,0.06);
    transform: translateY(-1px);
  }
  .panel {
    transition: box-shadow 150ms ease;
  }
  .panel:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  /* ─── Top nav (desktop) ─── */
  .app-nav-top {
    display: flex; gap: 2px; padding: 4px;
    background: #FFFFFF; border: 1px solid #E2E8E5; border-radius: 8px;
    overflow-x: auto; margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    scrollbar-width: none;
  }
  .app-nav-top::-webkit-scrollbar { display: none; }

  /* ─── Bottom nav (mobile) ─── */
  .app-nav-bottom {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: #FFFFFF; border-top: 1px solid #E2E8E5;
    padding: 0 4px env(safe-area-inset-bottom, 8px);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  }
  .app-nav-bottom-inner {
    display: flex; justify-content: space-around; align-items: center;
    max-width: 480px; margin: 0 auto;
  }
  .bottom-tab-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 10px 8px 6px; min-width: 56px;
    background: none; border: none; cursor: pointer;
    transition: color 150ms ease;
    font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: #9CA3AF;
  }
  .bottom-tab-btn.active { color: #065F46; }
  .bottom-tab-btn:active { transform: scale(0.94); }

  /* ─── More drawer (mobile) ─── */
  .more-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
    animation: fadeIn 150ms ease;
  }
  .more-sheet {
    position: fixed; left: 0; right: 0; bottom: 64px; z-index: 201;
    background: #FFFFFF; border-radius: 16px 16px 0 0;
    padding: 20px 16px 8px;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.14);
    animation: slideUp 200ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  /* ─── Transitions ─── */
  button { transition: background 120ms ease, color 120ms ease, opacity 120ms ease; }

  /* ─── Breakpoints ─── */
  /* Tablet: 641–1023 */
  @media (max-width: 1023px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }
  /* Mobile: ≤640px */
  @media (max-width: 640px) {
    .app-nav-top   { display: none !important; }
    .app-nav-bottom { display: block; }
    .app-main-content { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)) !important; }

    .kpi-grid     { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-2, .grid-3, .grid-4, .sim-grid { grid-template-columns: 1fr; }
    .form-grid-4  { grid-template-columns: repeat(2, 1fr); }
    .net-worth-form { grid-template-columns: 1fr; }

    /* Tighter panels on mobile */
    .panel-inner  { padding: 14px !important; }
    /* Reduce hero font on small screens */
    .hero-value   { font-size: 40px !important; }
    /* Sub-nav text size */
    .sub-nav-btn  { font-size: 11px !important; padding: 8px 10px !important; }
    /* Hide less critical columns in tables */
    .hide-mobile  { display: none !important; }
    /* Scrollable tables */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
  @media (max-width: 380px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .hero-value { font-size: 34px !important; }
  }
  /* Large desktop */
  @media (min-width: 1440px) {
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Cargando tu CFO Personal...</div>
    <div id="load-status" style="font-size:11px;color:#9BA0A8;font-family:'IBM Plex Sans',sans-serif;">Descargando librerías</div>
  </div>
</div>

<script>
window.addEventListener('error', function(e) {
  const root = document.getElementById('root');
  if (root && root.querySelector('.loading-screen')) {
    root.innerHTML = '<div class="loading-screen"><div class="error-box"><strong>Error al cargar:</strong><br><br>' +
      (e.message || 'Error desconocido') + '<br><br>' +
      '<small>Si persiste, intenta:<br>1. Recargar la página<br>2. Limpiar caché del navegador<br>3. Verificar tu conexión a internet</small>' +
      '</div></div>';
  }
});

setTimeout(function() {
  const status = document.getElementById('load-status');
  if (status && document.querySelector('.spinner')) {
    status.innerHTML = 'Tomando más tiempo de lo normal... verifica tu conexión';
    status.style.color = '#A66B2D';
  }
}, 15000);

function setStatus(msg) {
  const el = document.getElementById('load-status');
  if (el) el.textContent = msg;
}
</script>

var calcDisponible = function(config, bills, debts, goals) {
  var income  = config.biweeklyIncome || (config.monthlyIncome / 2) || 0;
  var paydays = config.payDays || [10, 25];
  var bQ1 = (bills||[]).filter(function(b){return b.dueDay>=paydays[0]&&b.dueDay<=paydays[1];}).reduce(function(s,b){return s+b.amount;},0);
  var bQ2 = (bills||[]).filter(function(b){return b.dueDay>paydays[1]||b.dueDay<paydays[0];}).reduce(function(s,b){return s+b.amount;},0);
  var debtBiw = (debts||[]).reduce(function(s,d){return s+((d.monthlyPayment>0?d.monthlyPayment:(d.minPayment||0))/2);},0);
  var goalBiw = (goals||[]).filter(function(g){return g.biweeklyContribution>0&&g.currentAmount<g.targetAmount;}).reduce(function(s,g){return s+g.biweeklyContribution;},0);
  return income - ((bQ1+bQ2)/2) - debtBiw - goalBiw;
};
